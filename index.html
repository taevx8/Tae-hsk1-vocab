<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 1 — Master Chinese</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- مكتبة الرسم الذكية -->
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --muted: #7a6f60;
    --border: #c8bfaa;
    --card-bg: #faf7f2;
    --shadow: rgba(26,16,8,0.12);
    --shadow-deep: rgba(26,16,8,0.25);
    --green: #2e7d32;
    --blue: #1565c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { background: var(--paper); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; background-image: radial-gradient(ellipse at 20% 0%, rgba(192,57,43,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(184,134,11,0.06) 0%, transparent 60%); }

  header { background: var(--ink); color: var(--paper); padding: 2rem 2rem 1.5rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px var(--shadow-deep); }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .logo { display: flex; align-items: baseline; gap: 0.75rem; }
  .logo-hanzi { font-family: 'Noto Serif SC', serif; font-size: 2.2rem; font-weight: 900; color: var(--red-light); line-height: 1; text-shadow: 0 0 20px rgba(231,76,60,0.4); }
  .logo-text { font-family: 'Crimson Pro', serif; font-size: 1.5rem; font-weight: 300; letter-spacing: 0.1em; color: var(--cream); }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.25em; color: var(--gold-light); text-transform: uppercase; margin-top: 0.15rem; }

  .controls { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap input { background: rgba(245,240,232,0.1); border: 1px solid rgba(245,240,232,0.2); border-radius: 6px; color: var(--paper); font-family: 'Crimson Pro', serif; font-size: 1rem; padding: 0.5rem 1rem 0.5rem 2.2rem; width: 220px; outline: none; }
  .search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: rgba(245,240,232,0.4); font-size: 0.9rem; }
  .btn-group { display: flex; gap: 0.4rem; }
  .btn { background: transparent; border: 1px solid rgba(245,240,232,0.25); border-radius: 6px; color: rgba(245,240,232,0.7); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 0.45rem 0.9rem; text-transform: uppercase; }
  .btn:hover, .btn.active { background: var(--red); border-color: var(--red); color: #fff; }
  .btn.gold.active { background: var(--gold); border-color: var(--gold); }
  .btn.srs-btn-head { border-color: var(--blue); color: var(--blue); }
  .btn.srs-btn-head:hover, .btn.srs-btn-head.active { background: var(--blue); color: #fff; }

  .progress-bar-wrap { display: flex; align-items: center; gap: 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--gold-light); }
  .progress-bar { width: 120px; height: 4px; background: rgba(245,240,232,0.15); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold-light)); transition: width 0.4s ease; }

  .filter-bar { background: var(--cream); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; align-items: center;}
  .filter-bar .label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase;}
  .cat-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); padding: 0.25rem 0.85rem; cursor: pointer; font-family: 'Crimson Pro'; font-size: 0.85rem; }
  .cat-btn.active { background: var(--red); color: white; border-color: var(--red); }

  .stats-bar { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem 0; display: flex; justify-content: space-between; align-items: center; }
  .stats-count { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); display:flex; align-items:center; gap:1rem;}
  .stats-count span { color: var(--red); font-weight: 500; }
  .streak-badge { background: linear-gradient(135deg, #e67e22, var(--red)); color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: bold; font-size: 0.7rem; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 0.2rem; box-shadow: 0 2px 4px rgba(230,126,34,0.3);}
  
  .view-toggle { display: flex; gap: 0.3rem; }
  .view-btn { background: var(--cream); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); padding: 0.3rem 0.6rem; cursor: pointer; }
  .view-btn.active { background: var(--ink); color: var(--paper); }

  main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; }
  .cards-grid.list-view { grid-template-columns: 1fr; gap: 0.75rem; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; position: relative; box-shadow: 0 2px 8px var(--shadow); transition: all 0.3s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px var(--shadow-deep); border-color: var(--gold); }
  .card.mastered { border-color: var(--green); background: linear-gradient(135deg, var(--card-bg), rgba(46,125,50,0.04)); }
  .card.mastered::after { content: '✓'; position: absolute; top: 0.5rem; right: 0.6rem; color: var(--green); font-size: 0.8rem; font-weight: bold; }
  .card-front { padding: 1.5rem 1rem; text-align: center; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; }
  .hanzi { font-family: 'Noto Serif SC', serif; font-size: 2.8rem; font-weight: 700; color: var(--ink); line-height: 1; }
  .card:hover .hanzi { color: var(--red); }
  .pinyin { font-family: 'Crimson Pro', serif; font-size: 0.95rem; color: var(--red); font-style: italic; }
  .meaning-short { font-size: 0.85rem; color: var(--muted); }
  .card-number { position: absolute; top: 0.5rem; left: 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--border); }

  /* Modal & Smart Board */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,16,8,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card-bg); border-radius: 16px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px var(--shadow-deep); }
  .modal-header { background: var(--ink); color: var(--paper); padding: 2rem 2rem 1.5rem; text-align: center; position: relative; border-radius: 16px 16px 0 0; }
  .modal-hanzi { font-family: 'Noto Serif SC', serif; font-size: 5rem; font-weight: 900; color: var(--paper); line-height: 1; text-shadow: 0 0 40px rgba(231,76,60,0.5); }
  .modal-pinyin { font-family: 'Crimson Pro', serif; font-size: 1.4rem; font-style: italic; color: var(--red-light); margin-top: 0.5rem; }
  .modal-meaning { font-size: 1.15rem; color: rgba(245,240,232,0.7); margin-top: 0.25rem; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(245,240,232,0.1); border: none; border-radius: 50%; color: var(--paper); cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 1.75rem 2rem 2rem; }
  .detail-section { margin-bottom: 1.5rem; }
  .detail-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
  .detail-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  
  .drawing-board-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; touch-action: none; background: var(--cream); padding: 1rem; border-radius: 8px; border: 1px solid var(--border);}
  .hanzi-character-box { background: var(--paper); border: 2px dashed #b8860b; border-radius: 8px; width: 100px; height: 100px; }
  .drawing-controls { display: flex; justify-content: center; gap: 0.5rem; }
  .draw-btn { background: var(--ink); color: var(--paper); border: none; padding: 0.4rem 0.8rem; border-radius: 6px; font-family: 'DM Mono'; font-size: 0.7rem; cursor: pointer; text-transform: uppercase;}
  .draw-btn.practice { background: var(--green); }

  .example-block { background: var(--cream); border-left: 3px solid var(--red); border-radius: 0 6px 6px 0; padding: 0.75rem; }
  .example-hanzi { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; color: var(--ink); }
  .example-pinyin { font-family: 'Crimson Pro', serif; font-style: italic; color: var(--red); font-size: 0.9rem; margin: 0.2rem 0; }
  .example-english { font-size: 0.9rem; color: var(--muted); }
  .tip-block { background: linear-gradient(135deg, rgba(184,134,11,0.08), rgba(184,134,11,0.04)); border: 1px solid rgba(184,134,11,0.2); border-radius: 6px; padding: 0.65rem 0.85rem; font-size: 0.9rem; color: var(--ink); }
  .writing-block { font-size: 0.9rem; color: var(--ink); }
  
  .speak-btn { background: var(--red); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.7rem; text-transform: uppercase; display: inline-flex; align-items: center; gap: 0.3rem; }
  .speak-btn.example { background: var(--blue); margin-top: 0.5rem; }
  
  /* SRS Navigation Area */
  .modal-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); gap: 10px; flex-wrap: wrap;}
  .nav-btn { background: var(--cream); border: 1px solid var(--border); border-radius: 8px; color: var(--ink); padding: 0.5rem 1rem; font-family: 'DM Mono'; font-size: 0.7rem; cursor: pointer; text-transform: uppercase;}
  .srs-actions { display: flex; gap: 0.5rem; flex: 1; justify-content: center; }
  .master-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-family: 'DM Mono'; font-size: 0.65rem; padding: 0.4rem 0.8rem; text-transform: uppercase; font-weight: bold; transition: all 0.2s;}
  .master-btn.hard { border-color: var(--red); color: var(--red); }
  .master-btn.hard:hover { background: var(--red); color: white; }
  .master-btn.easy { background: var(--green); border-color: var(--green); color: #fff; }
  .master-btn.easy:hover { opacity: 0.9; transform: scale(1.05); }

  /* Quiz & Toast */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--paper); border-radius: 8px; padding: 0.75rem 1.5rem; font-family: 'DM Mono'; font-size: 0.75rem; z-index: 2000; transition: transform 0.3s; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .quiz-overlay { display: none; position: fixed; inset: 0; background: var(--paper); z-index: 500; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .quiz-overlay.open { display: flex; }
  .quiz-card { background: var(--card-bg); border: 2px solid var(--border); border-radius: 20px; padding: 3rem; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 20px 60px var(--shadow-deep); }
  .quiz-hanzi { font-family: 'Noto Serif SC', serif; font-size: 6rem; font-weight: 900; color: var(--ink); margin-bottom: 1rem; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1.5rem; }
  .quiz-option { background: var(--cream); border: 2px solid var(--border); border-radius: 10px; color: var(--ink); cursor: pointer; font-family: 'Crimson Pro'; font-size: 1.05rem; padding: 0.85rem; }
  .quiz-option.correct { background: rgba(46,125,50,0.15); border-color: var(--green); color: var(--green); }
  .quiz-option.wrong { background: rgba(192,57,43,0.1); border-color: var(--red); color: var(--red); }
  .quiz-score { font-family: 'DM Mono'; font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }
  .quiz-close { position: fixed; top: 1.5rem; right: 1.5rem; background: var(--ink); border: none; border-radius: 50%; color: var(--paper); font-size: 1.2rem; width: 42px; height: 42px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div><div class="logo-hanzi">汉语</div><div class="logo-sub">HSK Level 1</div></div>
      <div class="logo-text">Master Chinese</div>
    </div>
    <div class="controls">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search characters..." oninput="filterCards()"></div>
      <div class="btn-group">
        <button class="btn active" onclick="setFilter('all',this)">All</button>
        <button class="btn srs-btn-head" onclick="setFilter('due',this)">Review Due</button>
        <button class="btn gold" onclick="setFilter('mastered',this)">Mastered</button>
      </div>
      <button class="btn" onclick="openQuiz()">⚡ Quiz</button>
      <div class="progress-bar-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText">0/500</span>
      </div>
    </div>
  </div>
</header>

<div class="filter-bar" id="filterBar"></div>
<div class="stats-bar">
  <div class="stats-count">
    <div>Showing <span id="countShown"></span> words</div>
    <div class="streak-badge" id="streakBadge">🧠 0 Days Streak</div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')">⊞</button>
    <button class="view-btn" id="listViewBtn" onclick="setView('list')">☰</button>
  </div>
</div>

<main><div class="cards-grid" id="cardsGrid"></div></main>

<!-- Modal with Drawing Board and SRS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-hanzi" id="mHanzi"></div>
      <div class="modal-pinyin" id="mPinyin"></div>
      <div class="modal-meaning" id="mMeaning"></div>
      <div style="margin-top:1rem;">
        <button class="speak-btn" onclick="speakWord()">🔊 Pronounce</button>
      </div>
    </div>
    <div class="modal-body">
      
      <!-- Smart Drawing Board -->
      <div class="detail-section">
        <div class="detail-label">✍️ Smart Drawing Board</div>
        <div class="drawing-board-container" id="hanziWriterContainer"></div>
        <div class="drawing-controls">
          <button class="draw-btn" onclick="animateWriters()">👁️ Animate</button>
          <button class="draw-btn practice" onclick="quizWriters()">🎯 Practice</button>
          <button class="draw-btn" onclick="resetWriters()">↺ Clear</button>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-label">Example Sentence</div>
        <div class="example-block">
          <div class="example-hanzi" id="mExHanzi"></div>
          <div class="example-pinyin" id="mExPinyin"></div>
          <div class="example-english" id="mExEnglish"></div>
        </div>
        <button class="speak-btn example" onclick="speakExample()">🔊 Hear Example</button>
      </div>
      <div class="detail-section">
        <div class="detail-label">Writing Guide</div>
        <div class="writing-block" id="mWriting"></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Memory Tip 💡</div>
        <div class="tip-block" id="mTip"></div>
      </div>
      
      <!-- SRS Controls -->
      <div class="modal-nav">
        <button class="nav-btn" onclick="navModal(-1)">← Prev</button>
        <div class="srs-actions">
          <button class="master-btn hard" onclick="processSRS('hard')">Hard ↻</button>
          <button class="master-btn easy" onclick="processSRS('good')">Easy ✓</button>
        </div>
        <button class="nav-btn" onclick="navModal(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<div class="quiz-overlay" id="quizOverlay">
  <button class="quiz-close" onclick="closeQuiz()">✕</button>
  <div class="quiz-score" id="quizScore">Score: 0 | Streak: 0</div>
  <div class="quiz-card">
    <div class="quiz-hanzi" id="quizHanzi">?</div>
    <div id="quizQuestion" style="font-size:1rem; color:var(--muted);">What does this mean?</div>
    <div class="quiz-options" id="quizOptions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// الصق جميع الكلمات الـ 175 الخاصة بك هنا (داخل القوسين المربعين)
// ════════════════════════════════════════════════
const hsk1 = [

{
    id:1, hanzi:"爱", pinyin:"ài", meaning:"to love; love",
    category:"Emotions",
    example:{ hanzi:"我爱你。", pinyin:"Wǒ ài nǐ.", english:"I love you." },
    writing:"Two components: 爫 (claw/hand) on top, 友 (friend) below — loving hands reaching for a friend.",
    tip:"Picture a hand (爫) resting over a heart with a friend (友) — 'love is a hand over your heart for a friend.'"
  },
  {
    id:2, hanzi:"八", pinyin:"bā", meaning:"eight",
    category:"Numbers",
    example:{ hanzi:"我有八本书。", pinyin:"Wǒ yǒu bā běn shū.", english:"I have eight books." },
    writing:"Two diagonal strokes spreading apart — like two legs walking apart. Simple and symmetric.",
    tip:"It looks like two legs spreading apart — 'eight legs of a spider spread out.' Also lucky in Chinese culture!"
  },
  {
    id:3, hanzi:"爸爸", pinyin:"bàba", meaning:"dad; father",
    category:"Family",
    example:{ hanzi:"我爸爸在家。", pinyin:"Wǒ bàba zài jiā.", english:"My dad is at home." },
    writing:"爸 = 父 (father radical) on top + 巴 (sound component). Doubled for emphasis.",
    tip:"'Ba-ba' sounds like a baby's first word for dad — universal baby talk for father!"
  },
  {
    id:4, hanzi:"杯子", pinyin:"bēizi", meaning:"cup; glass; mug",
    category:"Objects",
    example:{ hanzi:"这个杯子很漂亮。", pinyin:"Zhège bēizi hěn piàoliang.", english:"This cup is very beautiful." },
    writing:"杯: 木 (wood radical) + 不 (negation sound). 子: child — but here means 'small object.'",
    tip:"The 木 (tree/wood) radical hints at wooden cups. Imagine a tiny (子) wooden cup."
  },
  {
    id:5, hanzi:"北京", pinyin:"Běijīng", meaning:"Beijing (capital of China)",
    category:"Places",
    example:{ hanzi:"北京是中国的首都。", pinyin:"Běijīng shì Zhōngguó de shǒudū.", english:"Beijing is the capital of China." },
    writing:"北: two people back-to-back facing north/south. 京: tall building on a hill — the capital city.",
    tip:"北 (north) + 京 (capital) = Northern Capital. Easy — Beijing is literally the 'Northern Capital'!"
  },
  {
    id:6, hanzi:"本", pinyin:"běn", meaning:"book; volume; (measure word for books)",
    category:"Objects",
    example:{ hanzi:"我买了一本书。", pinyin:"Wǒ mǎile yī běn shū.", english:"I bought one book." },
    writing:"木 (tree/wood) with a stroke at the bottom — the ROOT of a tree. Books come from trees.",
    tip:"A tree (木) with a mark at its BASE — the root. Books come from the root (trees). Root → paper → book!"
  },
  {
    id:7, hanzi:"不客气", pinyin:"bú kèqi", meaning:"you're welcome; don't mention it",
    category:"Phrases",
    example:{ hanzi:"谢谢你！不客气！", pinyin:"Xièxie nǐ! Bú kèqi!", english:"Thank you! You're welcome!" },
    writing:"不 (not) + 客 (guest) + 气 (air/manner). Literally 'don't be a polite guest.'",
    tip:"'Not-guest-air' = Don't be so formal! Imagine waving off a very formal guest bowing to you."
  },
  {
    id:8, hanzi:"不", pinyin:"bù", meaning:"not; no (negation)",
    category:"Grammar",
    example:{ hanzi:"我不去。", pinyin:"Wǒ bù qù.", english:"I'm not going." },
    writing:"A bird flying upward — symbolizing something going away or being absent.",
    tip:"Looks like a bird (丿) flying away from under a roof (一) — what's NOT there flew away!"
  },
  {
    id:9, hanzi:"菜", pinyin:"cài", meaning:"vegetable; dish; food",
    category:"Food",
    example:{ hanzi:"这个菜很好吃。", pinyin:"Zhège cài hěn hǎochī.", english:"This dish is very delicious." },
    writing:"艹 (grass/plant radical on top) + 采 (to pick) — picking plants to eat.",
    tip:"Grass (艹) you pick (采) — picture picking fresh vegetables from a garden!"
  },
  {
    id:10, hanzi:"茶", pinyin:"chá", meaning:"tea",
    category:"Food",
    example:{ hanzi:"我喜欢喝茶。", pinyin:"Wǒ xǐhuān hē chá.", english:"I like drinking tea." },
    writing:"艹 (grass) on top, 木 (wood/tree) inside, 人 (person) at bottom — a person under a tea tree.",
    tip:"Grass (艹) + tree (木) + person (人) = a person sitting under a tea bush. Very zen!"
  },
  {
    id:11, hanzi:"吃", pinyin:"chī", meaning:"to eat",
    category:"Actions",
    example:{ hanzi:"我想吃饺子。", pinyin:"Wǒ xiǎng chī jiǎozi.", english:"I want to eat dumplings." },
    writing:"口 (mouth radical) + 乞 (to beg). An open mouth begging for food!",
    tip:"Mouth (口) + begging (乞) = eating! Picture someone opening their mouth and begging for food."

let mastered = JSON.parse(localStorage.getItem('hsk1_mastered') || '[]');
let srsData = JSON.parse(localStorage.getItem('hsk1_srs') || '{}');
let currentFilter = 'all';
let currentCategory = 'all';
let currentView = 'grid';
let modalIndex = 0;
let quizScore = 0; let quizStreak = 0; let quizCurrentWord = null;
let activeWriters = [];

const categories = [...new Set(hsk1.map(w => w.category))].sort();

// Streak System
function updateStreak() {
  const today = new Date().toDateString();
  let lastVisit = localStorage.getItem('hsk_last_visit');
  let streak = parseInt(localStorage.getItem('hsk_streak') || '0');
  if (lastVisit !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastVisit === yesterday.toDateString()) { streak++; } else { streak = 1; }
    localStorage.setItem('hsk_last_visit', today);
    localStorage.setItem('hsk_streak', streak);
  }
  document.getElementById('streakBadge').innerHTML = `🦋 ${streak} Days Streak`;
}

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<span class="label">Category:</span>';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => setCat('all', allBtn);
  bar.appendChild(allBtn);
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat;
    btn.onclick = () => setCat(cat, btn);
    bar.appendChild(btn);
  });
}

function setCat(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const now = Date.now();
  return hsk1.filter(w => {
    if (currentFilter === 'mastered' && !mastered.includes(w.id)) return false;
    if (currentFilter === 'unmastered' && mastered.includes(w.id)) return false;
    if (currentFilter === 'due') {
      let data = srsData[w.id];
      if (data && data.nextReview > now) return false; // Not due yet
      if (mastered.includes(w.id)) return false; // Skip if already mastered
    }
    if (currentCategory !== 'all' && w.category !== currentCategory) return false;
    if (q && !w.hanzi.includes(q) && !w.pinyin.toLowerCase().includes(q) && !w.meaning.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const words = getFiltered();
  document.getElementById('countShown').textContent = words.length;
  updateProgress();
  grid.innerHTML = '';
  words.forEach(w => {
    const isMastered = mastered.includes(w.id);
    const card = document.createElement('div');
    card.className = `card${isMastered ? ' mastered' : ''}`;
    card.innerHTML = `<div class="card-front" onclick="openModal(${hsk1.indexOf(w)})">
        <div class="card-number">#${w.id}</div>
        <div class="hanzi">${w.hanzi}</div>
        <div class="pinyin">${w.pinyin}</div>
        <div class="meaning-short">${w.meaning}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(idx) {
  modalIndex = idx;
  populateModal(hsk1[idx]);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function populateModal(w) {
  document.getElementById('mHanzi').textContent = w.hanzi;
  document.getElementById('mPinyin').textContent = w.pinyin;
  document.getElementById('mMeaning').textContent = w.meaning;
  document.getElementById('mExHanzi').textContent = w.example.hanzi;
  document.getElementById('mExPinyin').textContent = w.example.pinyin;
  document.getElementById('mExEnglish').textContent = w.example.english;
  document.getElementById('mWriting').textContent = w.writing;
  document.getElementById('mTip').textContent = w.tip;
  setupHanziWriter(w.hanzi);
}

// SRS Logic
function processSRS(grade) {
  const w = hsk1[modalIndex];
  const now = Date.now();
  if(!srsData[w.id]) srsData[w.id] = { level: 0, nextReview: 0 };

  if(grade === 'hard') {
    srsData[w.id].level = Math.max(0, srsData[w.id].level - 1);
    srsData[w.id].nextReview = now + (1000 * 60 * 60 * 12); // Review in 12 hours
    mastered = mastered.filter(id => id !== w.id);
    showToast('↻ Will review again soon.');
  } else if(grade === 'good') {
    srsData[w.id].level += 1;
    let days = Math.pow(2, srsData[w.id].level); // 2, 4, 8 days...
    srsData[w.id].nextReview = now + (1000 * 60 * 60 * 24 * days);
    if(srsData[w.id].level >= 2 && !mastered.includes(w.id)) { mastered.push(w.id); }
    showToast('✓ Great job! Mastered.');
  }
  
  localStorage.setItem('hsk1_srs', JSON.stringify(srsData));
  localStorage.setItem('hsk1_mastered', JSON.stringify(mastered));
  closeModalDirect();
  renderCards();
}

function setupHanziWriter(hanziWord) {
  const container = document.getElementById('hanziWriterContainer');
  container.innerHTML = ''; activeWriters = [];
  Array.from(hanziWord).forEach(char => {
    const box = document.createElement('div');
    box.className = 'hanzi-character-box';
    container.appendChild(box);
    const writer = HanziWriter.create(box, char, { width: 100, height: 100, padding: 5, showCharacter: false, strokeAnimationSpeed: 1.5, delayBetweenStrokes: 100, strokeColor: '#c0392b', drawingColor: '#2e7d32', outlineColor: '#ddd' });
    activeWriters.push(writer);
  });
}

function animateWriters() { activeWriters.forEach(w => w.animateCharacter()); }
function quizWriters() { activeWriters.forEach(w => w.quiz()); }
function resetWriters() { activeWriters.forEach(w => { w.hideCharacter(); w.cancelQuiz(); }); }

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; resetWriters(); }
function navModal(dir) { modalIndex = (modalIndex + dir + hsk1.length) % hsk1.length; populateModal(hsk1[modalIndex]); }

function updateProgress() {
  const pct = (mastered.length / (hsk1.length || 1) * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${mastered.length}/${hsk1.length || 500}`;
}

function speak(text) {
  if (!window.speechSynthesis) { showToast('Speech not supported.'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text); utt.lang = 'zh-CN'; utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}
function speakWord() { speak(hsk1[modalIndex].hanzi); }
function speakExample() { speak(hsk1[modalIndex].example.hanzi); }

function filterCards() { renderCards(); }
function setFilter(type, btn) { currentFilter = type; document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderCards(); }
function setView(v) { currentView = v; document.getElementById('gridViewBtn').classList.toggle('active', v === 'grid'); document.getElementById('listViewBtn').classList.toggle('active', v === 'list'); document.getElementById('cardsGrid').classList.toggle('list-view', v === 'list'); }

function openQuiz() { quizScore = 0; quizStreak = 0; document.getElementById('quizOverlay').classList.add('open'); nextQuestion(); }
function closeQuiz() { document.getElementById('quizOverlay').classList.remove('open'); }
function nextQuestion() {
  const pool = hsk1.filter(w => !mastered.includes(w.id));
  const source = pool.length >= 4 ? pool : hsk1;
  quizCurrentWord = source[Math.floor(Math.random() * source.length)];
  document.getElementById('quizHanzi').textContent = quizCurrentWord.hanzi;
  document.getElementById('quizScore').textContent = `Score: ${quizScore} | Streak: ${quizStreak} 🧠`;
  const wrongPool = hsk1.filter(w => w.id !== quizCurrentWord.id);
  const wrongs = []; while (wrongs.length < 3) { const r = wrongPool[Math.floor(Math.random() * wrongPool.length)]; if (!wrongs.find(w => w.id === r.id)) wrongs.push(r); }
  const options = [...wrongs, quizCurrentWord].sort(() => Math.random() - 0.5);
  const optDiv = document.getElementById('quizOptions'); optDiv.innerHTML = '';
  options.forEach(opt => { const btn = document.createElement('button'); btn.className = 'quiz-option'; btn.textContent = opt.meaning; btn.onclick = () => checkAnswer(opt.id === quizCurrentWord.id, btn, optDiv); optDiv.appendChild(btn); });
}
function checkAnswer(correct, btn, container) {
  container.querySelectorAll('.quiz-option').forEach(b => b.onclick = null);
  if (correct) { btn.classList.add('correct'); quizScore++; quizStreak++; showToast('✅ Correct!'); } 
  else { btn.classList.add('wrong'); quizStreak = 0; container.querySelectorAll('.quiz-option').forEach(b => { if (b.textContent === quizCurrentWord.meaning) b.classList.add('correct'); }); showToast('❌ Wrong!'); }
  setTimeout(nextQuestion, 1500);
}

let toastTimer;
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500); }

setTimeout(() => { 
  updateStreak();
  if (hsk1.length > 0) { buildFilterBar(); renderCards(); } 
  else { document.getElementById('cardsGrid').innerHTML = "<h2 style='text-align:center; width:100%; margin-top:2rem;'>الرجاء لصق الكلمات داخل مصفوفة hsk1 في الكود ليتم عرضها!</h2>"; } 
}, 100);
