  { id:176, hanzi:"操场", pinyin:"cāochǎng", meaning:"playground; sports field", category:"Places", example:{ hanzi:"我们在操场跑步。", pinyin:"Wǒmen zài cāochǎng pǎobù.", english:"We are running on the playground." }, writing:"操 (exercise) + 场 (field).", tip:"A field (场) where you do physical exercises (操)." },
  { id:177, hanzi:"草", pinyin:"cǎo", meaning:"grass", category:"Nature", example:{ hanzi:"羊在吃草。", pinyin:"Yáng zài chī cǎo.", english:"The sheep is eating grass." }, writing:"艹 (grass radical) + 早 (early).", tip:"Grass (艹) covered in dew early (早) in the morning." },
  { id:178, hanzi:"层", pinyin:"céng", meaning:"layer; floor (of a building)", category:"Objects", example:{ hanzi:"我住在三层。", pinyin:"Wǒ zhù zài sān céng.", english:"I live on the third floor." }, writing:"尸 (body/roof) + 云 (cloud).", tip:"A building so high it has layers reaching the clouds (云)." },
  { id:179, hanzi:"查", pinyin:"chá", meaning:"to check; to look up", category:"Actions", example:{ hanzi:"请查一下字典。", pinyin:"Qǐng chá yīxià zìdiǎn.", english:"Please check the dictionary." }, writing:"木 (tree/wood) + 旦 (dawn).", tip:"Checking the wooden (木) logs early at dawn (旦)." },
  { id:180, hanzi:"差", pinyin:"chà", meaning:"bad; poor; short of", category:"Adjectives", example:{ hanzi:"我的英语很差。", pinyin:"Wǒ de Yīngyǔ hěn chà.", english:"My English is very poor." }, writing:"羊 (sheep) + 工 (work).", tip:"A sheep trying to do construction work (工) would be very BAD at it!" },
  { id:181, hanzi:"长", pinyin:"cháng", meaning:"long", category:"Adjectives", example:{ hanzi:"她的头发很长。", pinyin:"Tā de tóufa hěn cháng.", english:"Her hair is very long." }, writing:"A simplified picture of long flowing hair.", tip:"Looks like a person with a very long lock of hair flying in the wind." },
  { id:182, hanzi:"常见", pinyin:"chángjiàn", meaning:"common; often seen", category:"General", example:{ hanzi:"这是常见的问题。", pinyin:"Zhè shì chángjiàn de wèntí.", english:"This is a common problem." }, writing:"常 (often) + 见 (see).", tip:"If you 'often' (常) 'see' (见) it, it is COMMON." },
  { id:183, hanzi:"唱", pinyin:"chàng", meaning:"to sing", category:"Actions", example:{ hanzi:"她喜欢唱歌。", pinyin:"Tā xǐhuān chànggē.", english:"She likes to sing." }, writing:"口 (mouth) + 昌 (prosperous/two suns).", tip:"A mouth (口) making bright, prosperous (昌) sounds = singing!" },
  { id:184, hanzi:"超市", pinyin:"chāoshì", meaning:"supermarket", category:"Places", example:{ hanzi:"我去超市买菜。", pinyin:"Wǒ qù chāoshì mǎi cài.", english:"I go to the supermarket to buy groceries." }, writing:"超 (super) + 市 (market).", tip:"Literal translation: Super (超) Market (市)." },
  { id:185, hanzi:"车", pinyin:"chē", meaning:"car; vehicle", category:"Transport", example:{ hanzi:"那是我的车。", pinyin:"Nà shì wǒ de chē.", english:"That is my car." }, writing:"A picture of a two-wheeled cart seen from above.", tip:"Looks like the axle and wheels of an ancient chariot." },
  { id:186, hanzi:"衬衫", pinyin:"chènshān", meaning:"shirt", category:"Objects", example:{ hanzi:"这件衬衫是白色的。", pinyin:"Zhè jiàn chènshān shì báisè de.", english:"This shirt is white." }, writing:"衤 (clothing radical) in both characters.", tip:"Both characters have the clothing radical (衤). A standard piece of clothing = shirt." },
  { id:187, hanzi:"成绩", pinyin:"chéngjì", meaning:"grade; score; achievement", category:"Education", example:{ hanzi:"我的考试成绩很好。", pinyin:"Wǒ de kǎoshì chéngjì hěn hǎo.", english:"My exam grade is very good." }, writing:"成 (succeed) + 绩 (spin thread/merit).", tip:"Succeeding (成) in accumulating merit (绩) = good grades!" },
  { id:188, hanzi:"城市", pinyin:"chéngshì", meaning:"city", category:"Places", example:{ hanzi:"我喜欢这个城市。", pinyin:"Wǒ xǐhuān zhège chéngshì.", english:"I like this city." }, writing:"城 (city wall) + 市 (market).", tip:"A place with protective walls (城) and bustling markets (市) = CITY." },
  { id:189, hanzi:"迟到", pinyin:"chídào", meaning:"to be late", category:"Actions", example:{ hanzi:"对不起，我迟到了。", pinyin:"Duìbuqǐ, wǒ chídào le.", english:"Sorry, I am late." }, writing:"迟 (late/slow) + 到 (arrive).", tip:"Arriving (到) slowly or delayed (迟)." },
  { id:190, hanzi:"出现", pinyin:"chūxiàn", meaning:"to appear; to arise", category:"Actions", example:{ hanzi:"问题出现了。", pinyin:"Wèntí chūxiàn le.", english:"A problem has appeared." }, writing:"出 (go out) + 现 (appear/show).", tip:"To come out (出) and be shown (现) to the world." },
  { id:191, hanzi:"穿", pinyin:"chuān", meaning:"to wear; to put on", category:"Actions", example:{ hanzi:"他穿着黑色的衣服。", pinyin:"Tā chuān zhe hēisè de yīfu.", english:"He is wearing black clothes." }, writing:"穴 (cave/hole) + 牙 (tooth).", tip:"Putting your head through the hole (穴) of a shirt." },
  { id:192, hanzi:"床", pinyin:"chuáng", meaning:"bed", category:"Objects", example:{ hanzi:"我想在床上睡觉。", pinyin:"Wǒ xiǎng zài chuáng shang shuìjiào.", english:"I want to sleep on the bed." }, writing:"广 (shelter) + 木 (wood).", tip:"A wooden (木) structure you sleep on under a shelter (广)." },
  { id:193, hanzi:"词典", pinyin:"cídiǎn", meaning:"dictionary", category:"Objects", example:{ hanzi:"我买了一本词典。", pinyin:"Wǒ mǎile yī běn cídiǎn.", english:"I bought a dictionary." }, writing:"词 (word) + 典 (standard/book).", tip:"The standard book (典) of words (词)." },
  { id:194, hanzi:"次", pinyin:"cì", meaning:"number of times; occurrence", category:"Grammar", example:{ hanzi:"我去过两次北京。", pinyin:"Wǒ qù guò liǎng cì Běijīng.", english:"I have been to Beijing twice." }, writing:"冫 (ice) + 欠 (yawn/owe).", tip:"You yawn (欠) a second TIME because it's cold (冫)." },
  { id:195, hanzi:"聪明", pinyin:"cōngmíng", meaning:"smart; clever", category:"Adjectives", example:{ hanzi:"这个孩子很聪明。", pinyin:"Zhège háizi hěn cōngmíng.", english:"This child is very smart." }, writing:"聪 (hearing/ear) + 明 (bright/sight).", tip:"Good hearing (耳) and bright sight (明) = a sharp, SMART mind!" },
  { id:196, hanzi:"从", pinyin:"cóng", meaning:"from", category:"Grammar", example:{ hanzi:"我从中国来。", pinyin:"Wǒ cóng Zhōngguó lái.", english:"I come from China." }, writing:"Two people (人) walking one after another.", tip:"One person following FROM behind another." },
  { id:197, hanzi:"错", pinyin:"cuò", meaning:"wrong; mistake", category:"Adjectives", example:{ hanzi:"你写错了。", pinyin:"Nǐ xiě cuò le.", english:"You wrote it wrong." }, writing:"钅 (metal) + 昔 (past).", tip:"Ancient metals (昔) getting rusty and WRONG over time." },
  { id:198, hanzi:"答案", pinyin:"dá'àn", meaning:"answer; solution", category:"Education", example:{ hanzi:"你知道答案吗？", pinyin:"Nǐ zhīdào dá'àn ma?", english:"Do you know the answer?" }, writing:"答 (reply) + 案 (case/file).", tip:"The official file (案) containing the reply (答)." },
  { id:199, hanzi:"打", pinyin:"dǎ", meaning:"to hit; to play (a sport with hands)", category:"Actions", example:{ hanzi:"不要打人。", pinyin:"Búyào dǎ rén.", english:"Don't hit people." }, writing:"扌 (hand radical) + 丁 (nail).", tip:"Using your hand (扌) to strike a nail (丁)." },
  { id:200, hanzi:"打扫", pinyin:"dǎsǎo", meaning:"to clean; to sweep", category:"Actions", example:{ hanzi:"我在打扫房间。", pinyin:"Wǒ zài dǎsǎo fángjiān.", english:"I am cleaning the room." }, writing:"打 (do/hit) + 扫 (sweep: hand+broom).", tip:"Using your hands (扌) to work and sweep away the dirt." },
  { id:201, hanzi:"打算", pinyin:"dǎsuàn", meaning:"to plan; to intend", category:"Actions", example:{ hanzi:"你打算做什么？", pinyin:"Nǐ dǎsuàn zuò shénme?", english:"What do you plan to do?" }, writing:"打 (do) + 算 (calculate/compute).", tip:"Calculating (算) your next moves = PLANNING." },
  { id:202, hanzi:"大家", pinyin:"dàjiā", meaning:"everyone", category:"People", example:{ hanzi:"大家好！", pinyin:"Dàjiā hǎo!", english:"Hello everyone!" }, writing:"大 (big) + 家 (family).", tip:"A big (大) family (家) = EVERYONE gathered together!" },
  { id:203, hanzi:"蛋糕", pinyin:"dàngāo", meaning:"cake", category:"Food", example:{ hanzi:"今天是我的生日，我吃蛋糕。", pinyin:"Jīntiān shì wǒ de shēngrì, wǒ chī dàngāo.", english:"Today is my birthday, I eat cake." }, writing:"蛋 (egg) + 糕 (cake/pastry).", tip:"A pastry (糕) made of eggs (蛋) = CAKE!" },
  { id:204, hanzi:"但是", pinyin:"dànshì", meaning:"but; however", category:"Grammar", example:{ hanzi:"我想去，但是我没有钱。", pinyin:"Wǒ xiǎng qù, dànshì wǒ méiyǒu qián.", english:"I want to go, but I don't have money." }, writing:"但 (but) + 是 (is).", tip:"The standard transition word for BUT." },
  { id:205, hanzi:"当然", pinyin:"dāngrán", meaning:"of course", category:"Phrases", example:{ hanzi:"当然可以！", pinyin:"Dāngrán kěyǐ!", english:"Of course you can!" }, writing:"当 (should) + 然 (so/thus).", tip:"It should be so = OF COURSE!" },
  { id:206, hanzi:"导游", pinyin:"dǎoyóu", meaning:"tour guide", category:"People", example:{ hanzi:"我的哥哥是导游。", pinyin:"Wǒ de gēge shì dǎoyóu.", english:"My older brother is a tour guide." }, writing:"导 (guide/lead) + 游 (travel/swim).", tip:"The person who leads (导) your travel (游)." },
  { id:207, hanzi:"到", pinyin:"dào", meaning:"to arrive; to reach", category:"Actions", example:{ hanzi:"你到了吗？", pinyin:"Nǐ dào le ma?", english:"Have you arrived?" }, writing:"至 (arrive) + 刂 (knife).", tip:"The left part (至) literally means a bird swooping down to ARRIVE at the ground." },
  { id:208, hanzi:"得", pinyin:"de", meaning:"(structural particle for degree)", category:"Grammar", example:{ hanzi:"他跑得很快。", pinyin:"Tā pǎo de hěn kuài.", english:"He runs very fast." }, writing:"彳 (step) + 旦 (dawn) + 寸 (inch).", tip:"Connects a verb to an adjective describing how the action was done." },
  { id:209, hanzi:"等", pinyin:"děng", meaning:"to wait", category:"Actions", example:{ hanzi:"请等我一下。", pinyin:"Qǐng děng wǒ yīxià.", english:"Please wait for me a moment." }, writing:"⺮ (bamboo) + 寺 (temple).", tip:"Waiting peacefully like bamboo (⺮) growing at a temple (寺)." },
  { id:210, hanzi:"弟弟", pinyin:"dìdi", meaning:"younger brother", category:"Family", example:{ hanzi:"我弟弟五岁。", pinyin:"Wǒ dìdi wǔ suì.", english:"My younger brother is five years old." }, writing:"A pictograph of a thread wound around a spool.", tip:"Brotherly ties binding the family together." },
  { id:211, hanzi:"地方", pinyin:"dìfang", meaning:"place; location", category:"Places", example:{ hanzi:"这是一个好地方。", pinyin:"Zhè shì yīgè hǎo dìfang.", english:"This is a good place." }, writing:"地 (earth) + 方 (square/direction).", tip:"A specific square (方) of the earth (地) = a PLACE." },
  { id:212, hanzi:"地铁", pinyin:"dìtiě", meaning:"subway; metro", category:"Transport", example:{ hanzi:"我坐地铁去上班。", pinyin:"Wǒ zuò dìtiě qù shàngbān.", english:"I take the subway to work." }, writing:"地 (earth/ground) + 铁 (iron).", tip:"The iron (铁) train that runs under the earth (地)." },
  { id:213, hanzi:"地图", pinyin:"dìtú", meaning:"map", category:"Objects", example:{ hanzi:"我在看地图。", pinyin:"Wǒ zài kàn dìtú.", english:"I am looking at the map." }, writing:"地 (earth/ground) + 图 (picture/diagram).", tip:"A picture/diagram (图) of the earth (地) = MAP." },
  { id:214, hanzi:"第一", pinyin:"dì yī", meaning:"first; number one", category:"Numbers", example:{ hanzi:"他是第一名。", pinyin:"Tā shì dì yī míng.", english:"He is in first place." }, writing:"第 (prefix for ordinal numbers) + 一 (one).", tip:"第 is used before any number to make it 1st, 2nd, 3rd, etc." },
  { id:215, hanzi:"懂", pinyin:"dǒng", meaning:"to understand", category:"Actions", example:{ hanzi:"你懂了吗？", pinyin:"Nǐ dǒng le ma?", english:"Do you understand?" }, writing:"忄 (heart/mind) + 董 (director/manage).", tip:"Your mind (忄) managing to grasp the concept = UNDERSTAND." },
  { id:216, hanzi:"动物", pinyin:"dòngwù", meaning:"animal", category:"Animals", example:{ hanzi:"我喜欢小动物。", pinyin:"Wǒ xǐhuān xiǎo dòngwù.", english:"I like small animals." }, writing:"动 (move) + 物 (thing).", tip:"A thing (物) that can move (动) on its own = ANIMAL." },
  { id:217, hanzi:"短", pinyin:"duǎn", meaning:"short (length)", category:"Adjectives", example:{ hanzi:"这个裤子太短了。", pinyin:"Zhège kùzi tài duǎn le.", english:"These pants are too short." }, writing:"矢 (arrow) + 豆 (bean).", tip:"An arrow (矢) as small as a bean (豆) is very SHORT." },
  { id:218, hanzi:"段", pinyin:"duàn", meaning:"paragraph; section; period", category:"Grammar", example:{ hanzi:"这段时间我很忙。", pinyin:"Zhè duàn shíjiān wǒ hěn máng.", english:"I am very busy during this period." }, writing:"A cliff and a tool breaking something into pieces.", tip:"A piece or section of time, text, or distance." },
  { id:219, hanzi:"锻炼", pinyin:"duànliàn", meaning:"to exercise; to work out", category:"Activities", example:{ hanzi:"我每天早上锻炼。", pinyin:"Wǒ měitiān zǎoshang duànliàn.", english:"I exercise every morning." }, writing:"锻 (forge metal) + 炼 (refine).", tip:"Forging and refining your body like metal = WORKING OUT." },
  { id:220, hanzi:"饿", pinyin:"è", meaning:"hungry", category:"Emotions", example:{ hanzi:"我饿了，想吃饭。", pinyin:"Wǒ è le, xiǎng chīfàn.", english:"I am hungry, I want to eat." }, writing:"饣 (food radical) + 我 (I/me).", tip:"I (我) need food (饣) because I am HUNGRY!" },
  { id:221, hanzi:"发烧", pinyin:"fāshāo", meaning:"to have a fever", category:"Body", example:{ hanzi:"我不舒服，发烧了。", pinyin:"Wǒ bù shūfu, fāshāo le.", english:"I don't feel well, I have a fever." }, writing:"发 (emit) + 烧 (burn).", tip:"Emitting (发) burning heat (烧) = FEVER." },
  { id:222, hanzi:"发现", pinyin:"fāxiàn", meaning:"to discover; to find", category:"Actions", example:{ hanzi:"我发现了一个好餐厅。", pinyin:"Wǒ fāxiàn le yīgè hǎo cāntīng.", english:"I discovered a good restaurant." }, writing:"发 (issue/emit) + 现 (appear).", tip:"To make something appear or be known = DISCOVER." },
  { id:223, hanzi:"方便", pinyin:"fāngbiàn", meaning:"convenient", category:"Adjectives", example:{ hanzi:"坐地铁很方便。", pinyin:"Zuò dìtiě hěn fāngbiàn.", english:"Taking the subway is very convenient." }, writing:"方 (direction) + 便 (convenient).", tip:"When going in any direction (方) is easy, it is CONVENIENT." },
  { id:224, hanzi:"房间", pinyin:"fángjiān", meaning:"room", category:"Places", example:{ hanzi:"我的房间很大。", pinyin:"Wǒ de fángjiān hěn dà.", english:"My room is very big." }, writing:"房 (house/room) + 间 (space between).", tip:"A defined space (间) inside a house (房) = ROOM." },
  { id:225, hanzi:"放", pinyin:"fàng", meaning:"to put; to place; to let go", category:"Actions", example:{ hanzi:"请把书放在桌子上。", pinyin:"Qǐng bǎ shū fàng zài zhuōzi shang.", english:"Please put the book on the table." }, writing:"方 (square/direction) + 攵 (hand doing).", tip:"A hand (攵) placing an object down squarely (方)." },
  { id:226, hanzi:"附近", pinyin:"fùjìn", meaning:"nearby; vicinity", category:"Direction", example:{ hanzi:"我家附近有公园。", pinyin:"Wǒ jiā fùjìn yǒu gōngyuán.", english:"There is a park near my home." }, writing:"附 (attach) + 近 (close).", tip:"Areas attached (附) and close (近) to you = NEARBY." },
  { id:227, hanzi:"复习", pinyin:"fùxí", meaning:"to review; to revise", category:"Education", example:{ hanzi:"明天考试，我要复习。", pinyin:"Míngtiān kǎoshì, wǒ yào fùxí.", english:"Exam tomorrow, I need to review." }, writing:"复 (repeat) + 习 (practice).", tip:"Repeating (复) your practice (习) = REVIEWING." },
  { id:228, hanzi:"干净", pinyin:"gānjìng", meaning:"clean", category:"Adjectives", example:{ hanzi:"这件衣服很干净。", pinyin:"Zhè jiàn yīfu hěn gānjìng.", english:"This shirt is very clean." }, writing:"干 (dry/clean) + 净 (pure/clean).", tip:"When something is dry (干) and pure (净), it is perfectly CLEAN." },
  { id:229, hanzi:"感冒", pinyin:"gǎnmào", meaning:"to catch a cold", category:"Body", example:{ hanzi:"我感冒了，不能去上课。", pinyin:"Wǒ gǎnmào le, bù néng qù shàngkè.", english:"I caught a cold, I can't go to class." }, writing:"感 (feel) + 冒 (emit/risk).", tip:"Feeling (感) under the weather and risking (冒) a sickness = catching a cold." },
  { id:230, hanzi:"刚才", pinyin:"gāngcái", meaning:"just now; a moment ago", category:"Time", example:{ hanzi:"他刚才出去了。", pinyin:"Tā gāngcái chūqù le.", english:"He went out just now." }, writing:"刚 (firm/just) + 才 (just/talent).", tip:"Something that happened strictly JUST a moment ago." },
  { id:231, hanzi:"高", pinyin:"gāo", meaning:"tall; high", category:"Adjectives", example:{ hanzi:"他很高。", pinyin:"Tā hěn gāo.", english:"He is very tall." }, writing:"A pictograph of a tall building with multiple stories.", tip:"Looks like a tall tower standing high!" },
  { id:232, hanzi:"告诉", pinyin:"gàosu", meaning:"to tell", category:"Actions", example:{ hanzi:"请告诉我你的名字。", pinyin:"Qǐng gàosu wǒ nǐ de míngzi.", english:"Please tell me your name." }, writing:"告 (announce) + 诉 (complain/tell).", tip:"Announcing (告) information using speech (讠 in 诉)." },
  { id:233, hanzi:"哥哥", pinyin:"gēge", meaning:"older brother", category:"Family", example:{ hanzi:"我哥哥是医生。", pinyin:"Wǒ gēge shì yīshēng.", english:"My older brother is a doctor." }, writing:"Two mouths (口) singing or speaking, over a support.", tip:"The loud older brother speaking up for the younger ones." },
  { id:234, hanzi:"给", pinyin:"gěi", meaning:"to give; for", category:"Actions", example:{ hanzi:"给你一本书。", pinyin:"Gěi nǐ yī běn shū.", english:"Give you a book." }, writing:"纟(silk) + 合 (join).", tip:"Joining (合) silk threads to GIVE as a gift." },
  { id:235, hanzi:"公交车", pinyin:"gōngjiāochē", meaning:"public bus", category:"Transport", example:{ hanzi:"我坐公交车去学校。", pinyin:"Wǒ zuò gōngjiāochē qù xuéxiào.", english:"I take the bus to school." }, writing:"公 (public) + 交 (transport/cross) + 车 (vehicle).", tip:"Public (公) transport (交) vehicle (车) = BUS." },
  { id:236, hanzi:"公斤", pinyin:"gōngjīn", meaning:"kilogram", category:"Objects", example:{ hanzi:"我买了两公斤苹果。", pinyin:"Wǒ mǎile liǎng gōngjīn píngguǒ.", english:"I bought two kilograms of apples." }, writing:"公 (public/metric) + 斤 (jin/half-kilo).", tip:"The public/metric (公) weight unit = KILOGRAM." },
  { id:237, hanzi:"公司", pinyin:"gōngsī", meaning:"company", category:"Places", example:{ hanzi:"他在一家大公司工作。", pinyin:"Tā zài yī jiā dà gōngsī gōngzuò.", english:"He works in a big company." }, writing:"公 (public) + 司 (control/manage).", tip:"An organization that manages (司) public (公) business = COMPANY." },
  { id:238, hanzi:"公园", pinyin:"gōngyuán", meaning:"park", category:"Places", example:{ hanzi:"周末我去公园散步。", pinyin:"Zhōumò wǒ qù gōngyuán sànbù.", english:"I go for a walk in the park on weekends." }, writing:"公 (public) + 园 (garden).", tip:"A public (公) garden (园) = PARK." },
  { id:239, hanzi:"故事", pinyin:"gùshi", meaning:"story", category:"Entertainment", example:{ hanzi:"妈妈给我讲故事。", pinyin:"Māma gěi wǒ jiǎng gùshi.", english:"Mom tells me a story." }, writing:"故 (old/past) + 事 (matter/thing).", tip:"Matters and things (事) from the old past (故) = STORY." },
  { id:240, hanzi:"刮风", pinyin:"guāfēng", meaning:"wind blowing", category:"Weather", example:{ hanzi:"今天刮风了。", pinyin:"Jīntiān guāfēng le.", english:"It's windy today." }, writing:"刮 (scrape/blow) + 风 (wind).", tip:"The wind (风) scraping (刮) against your face." },
  { id:241, hanzi:"关", pinyin:"guān", meaning:"to close; to turn off", category:"Actions", example:{ hanzi:"请关门。", pinyin:"Qǐng guān mén.", english:"Please close the door." }, writing:"A pictograph of a wooden bar closing a door.", tip:"Looks like a gate being barred shut horizontally. CLOSE!" },
  { id:242, hanzi:"关系", pinyin:"guānxi", meaning:"relation; connection", category:"General", example:{ hanzi:"我们的关系很好。", pinyin:"Wǒmen de guānxi hěn hǎo.", english:"Our relationship is very good." }, writing:"关 (connect/gate) + 系 (tie/system).", tip:"Tying (系) connections (关) between people." },
  { id:243, hanzi:"关心", pinyin:"guānxīn", meaning:"to care about; to be concerned", category:"Emotions", example:{ hanzi:"谢谢你的关心。", pinyin:"Xièxie nǐ de guānxīn.", english:"Thank you for your concern." }, writing:"关 (connect) + 心 (heart).", tip:"Connecting your heart (心) to someone = CARING." },
  { id:244, hanzi:"关于", pinyin:"guānyú", meaning:"about; regarding", category:"Grammar", example:{ hanzi:"这是一本关于历史的书。", pinyin:"Zhè shì yī běn guānyú lìshǐ de shū.", english:"This is a book about history." }, writing:"关 (connect) + 于 (in/at).", tip:"Connecting to a specific topic = ABOUT." },
  { id:245, hanzi:"国家", pinyin:"guójiā", meaning:"country; nation", category:"Places", example:{ hanzi:"中国是一个大国家。", pinyin:"Zhōngguó shì yīgè dà guójiā.", english:"China is a large country." }, writing:"国 (country) + 家 (family).", tip:"The nation (国) acts as one big family (家)." },
  { id:246, hanzi:"过", pinyin:"guò", meaning:"to pass; to cross; (experiential particle)", category:"Grammar", example:{ hanzi:"我去过中国。", pinyin:"Wǒ qù guò Zhōngguó.", english:"I have been to China." }, writing:"辶 (movement) + 寸 (inch/measure).", tip:"Moving (辶) past a measure of time or space." },
  { id:247, hanzi:"过去", pinyin:"guòqù", meaning:"past; in the past", category:"Time", example:{ hanzi:"那是过去的事情了。", pinyin:"Nà shì guòqù de shìqing le.", english:"That is a matter of the past." }, writing:"过 (pass) + 去 (go).", tip:"Things that have passed (过) and gone (去) = THE PAST." },
  { id:248, hanzi:"还是", pinyin:"háishi", meaning:"still; or (in questions)", category:"Grammar", example:{ hanzi:"你喝茶还是喝咖啡？", pinyin:"Nǐ hē chá háishi hē kāfēi?", english:"Do you drink tea or coffee?" }, writing:"还 (still) + 是 (is).", tip:"Used to offer choices in a question: This OR that?" },
  { id:249, hanzi:"害怕", pinyin:"hàipà", meaning:"to be afraid; to fear", category:"Emotions", example:{ hanzi:"我害怕狗。", pinyin:"Wǒ hàipà gǒu.", english:"I am afraid of dogs." }, writing:"害 (harm) + 怕 (fear).", tip:"Fearing (怕) that something will harm (害) you." },
  { id:250, hanzi:"黑", pinyin:"hēi", meaning:"black; dark", category:"Adjectives", example:{ hanzi:"天黑了。", pinyin:"Tiān hēi le.", english:"It has gotten dark." }, writing:"里 (village/inside) + 灬 (fire).", tip:"A fire (灬) burning inside a village creates black soot." }

  { id:251, hanzi:"黑板", pinyin:"hēibǎn", meaning:"blackboard", category:"Education", example:{ hanzi:"老师在黑板上写字。", pinyin:"Lǎoshī zài hēibǎn shàng xiězì.", english:"The teacher writes on the blackboard." }, writing:"黑 (black) + 板 (board).", tip:"Literal translation: Black (黑) board (板)." },
  { id:252, hanzi:"红", pinyin:"hóng", meaning:"red", category:"Colors", example:{ hanzi:"我喜欢红色的衣服。", pinyin:"Wǒ xǐhuān hóngsè de yīfu.", english:"I like red clothes." }, writing:"纟 (silk) + 工 (work).", tip:"Dyeing silk (纟) red was an important work (工)." },
  { id:253, hanzi:"后来", pinyin:"hòulái", meaning:"afterwards; later", category:"Time", example:{ hanzi:"后来他去了北京。", pinyin:"Hòulái tā qù le Běijīng.", english:"Later he went to Beijing." }, writing:"后 (after) + 来 (come).", tip:"What comes (来) after (后) = LATER." },
  { id:254, hanzi:"护照", pinyin:"hùzhào", meaning:"passport", category:"Objects", example:{ hanzi:"我的护照在哪儿？", pinyin:"Wǒ de hùzhào zài nǎr?", english:"Where is my passport?" }, writing:"护 (protect) + 照 (photo/shine).", tip:"A document that protects (护) you and has your photo (照)." },
  { id:255, hanzi:"花", pinyin:"huā", meaning:"flower; to spend (money/time)", category:"Nature", example:{ hanzi:"这些花很漂亮。", pinyin:"Zhèxiē huā hěn piàoliang.", english:"These flowers are very beautiful." }, writing:"艹 (grass/plant) + 化 (change).", tip:"A plant (艹) that transforms (化) into a beautiful blossom." },
  { id:256, hanzi:"画", pinyin:"huà", meaning:"to draw; picture", category:"Actions", example:{ hanzi:"他画了一只鸟。", pinyin:"Tā huà le yī zhī niǎo.", english:"He drew a bird." }, writing:"一 (one) + 田 (field) + 凵 (receptacle).", tip:"A hand drawing borders around a field to make a picture." },
  { id:257, hanzi:"坏", pinyin:"huài", meaning:"bad; broken", category:"Adjectives", example:{ hanzi:"我的手机坏了。", pinyin:"Wǒ de shǒujī huài le.", english:"My phone is broken." }, writing:"土 (earth) + 不 (not).", tip:"When earth/clay is 'not' (不) formed well, it goes BAD/BROKEN." },
  { id:258, hanzi:"欢迎", pinyin:"huānyíng", meaning:"to welcome", category:"Phrases", example:{ hanzi:"欢迎来中国！", pinyin:"Huānyíng lái Zhōngguó!", english:"Welcome to China!" }, writing:"欢 (joyous) + 迎 (greet).", tip:"To greet (迎) someone with joy (欢) = WELCOME." },
  { id:259, hanzi:"环境", pinyin:"huánjìng", meaning:"environment", category:"Places", example:{ hanzi:"这里的环境很好。", pinyin:"Zhèlǐ de huánjìng hěn hǎo.", english:"The environment here is very good." }, writing:"环 (ring/surround) + 境 (border/place).", tip:"The place and borders that surround (环) you = ENVIRONMENT." },
  { id:260, hanzi:"换", pinyin:"huàn", meaning:"to change; to exchange", category:"Actions", example:{ hanzi:"我想换点儿钱。", pinyin:"Wǒ xiǎng huàn diǎnr qián.", english:"I want to exchange some money." }, writing:"扌(hand) + 奂 (excellent/exchange).", tip:"Using your hand (扌) to exchange items." },
  { id:261, hanzi:"黄河", pinyin:"Huánghé", meaning:"Yellow River", category:"Places", example:{ hanzi:"黄河在中国。", pinyin:"Huánghé zài Zhōngguó.", english:"The Yellow River is in China." }, writing:"黄 (yellow) + 河 (river).", tip:"Literal translation: Yellow (黄) River (河)." },
  { id:262, hanzi:"回答", pinyin:"huídá", meaning:"to answer; reply", category:"Actions", example:{ hanzi:"请回答我的问题。", pinyin:"Qǐng huídá wǒ de wèntí.", english:"Please answer my question." }, writing:"回 (return) + 答 (reply).", tip:"Returning (回) a reply (答) to a question." },
  { id:263, hanzi:"会议", pinyin:"huìyì", meaning:"meeting; conference", category:"Work", example:{ hanzi:"下午有一个会议。", pinyin:"Xiàwǔ yǒu yīgè huìyì.", english:"There is a meeting in the afternoon." }, writing:"会 (gather) + 议 (discuss).", tip:"Gathering (会) to discuss (议) = MEETING." },
  { id:264, hanzi:"护士", pinyin:"hùshi", meaning:"nurse", category:"People", example:{ hanzi:"她在医院做护士。", pinyin:"Tā zài yīyuàn zuò hùshi.", english:"She works as a nurse in the hospital." }, writing:"护 (protect/care) + 士 (professional).", tip:"A professional (士) who cares for and protects (护) patients." },
  { id:265, hanzi:"火车站", pinyin:"huǒchēzhàn", meaning:"train station", category:"Places", example:{ hanzi:"我在火车站等你。", pinyin:"Wǒ zài huǒchēzhàn děng nǐ.", english:"I am waiting for you at the train station." }, writing:"火 (fire) + 车 (vehicle) + 站 (station).", tip:"Fire-vehicle = train (steam engines). Train + station!" },
  { id:266, hanzi:"或者", pinyin:"huòzhě", meaning:"or (in statements)", category:"Grammar", example:{ hanzi:"你可以喝茶或者咖啡。", pinyin:"Nǐ kěyǐ hē chá huòzhě kāfēi.", english:"You can drink tea or coffee." }, writing:"或 (or/perhaps) + 者 (person/thing).", tip:"Used for 'or' in regular statements, unlike 还是 (for questions)." },
  { id:267, hanzi:"机场", pinyin:"jīchǎng", meaning:"airport", category:"Places", example:{ hanzi:"我们去机场接朋友。", pinyin:"Wǒmen qù jīchǎng jiē péngyou.", english:"We are going to the airport to pick up a friend." }, writing:"机 (machine/plane) + 场 (field).", tip:"A field (场) for flying machines (机) = AIRPORT." },
  { id:268, hanzi:"鸡蛋", pinyin:"jīdàn", meaning:"chicken egg", category:"Food", example:{ hanzi:"我每天吃一个鸡蛋。", pinyin:"Wǒ měitiān chī yīgè jīdàn.", english:"I eat an egg every day." }, writing:"鸡 (chicken) + 蛋 (egg).", tip:"Literal translation: Chicken (鸡) egg (蛋)." },
  { id:269, hanzi:"几乎", pinyin:"jīhū", meaning:"almost; nearly", category:"Grammar", example:{ hanzi:"我几乎忘了这件事。", pinyin:"Wǒ jīhū wàng le zhè jiàn shì.", english:"I almost forgot this matter." }, writing:"几 (almost) + 乎 (particle).", tip:"A classical pairing meaning 'very close to' or ALMOST." },
  { id:270, hanzi:"机会", pinyin:"jīhuì", meaning:"opportunity; chance", category:"General", example:{ hanzi:"这是一个好机会。", pinyin:"Zhè shì yīgè hǎo jīhuì.", english:"This is a good opportunity." }, writing:"机 (machine/opportunity) + 会 (meet).", tip:"When the right elements meet (会), it creates an OPPORTUNITY (机)." },
  { id:271, hanzi:"极", pinyin:"jí", meaning:"extremely", category:"Adjectives", example:{ hanzi:"这个菜好吃极了。", pinyin:"Zhège cài hǎochī jí le.", english:"This dish is extremely delicious." }, writing:"木 (wood) + 及 (reach).", tip:"Reaching (及) the highest wooden (木) peak = EXTREMELY." },
  { id:272, hanzi:"记得", pinyin:"jìde", meaning:"to remember", category:"Actions", example:{ hanzi:"你还记得我吗？", pinyin:"Nǐ hái jìde wǒ ma?", english:"Do you still remember me?" }, writing:"记 (record/memorize) + 得 (obtain/can).", tip:"Being able to obtain (得) the recorded (记) memory." },
  { id:273, hanzi:"季节", pinyin:"jìjié", meaning:"season", category:"Time", example:{ hanzi:"一年有四个季节。", pinyin:"Yī nián yǒu sì gè jìjié.", english:"A year has four seasons." }, writing:"季 (season) + 节 (festival/node).", tip:"The nodes (节) of the year's seasons (季)." },
  { id:274, hanzi:"检查", pinyin:"jiǎnchá", meaning:"to check; to examine", category:"Actions", example:{ hanzi:"医生给我检查身体。", pinyin:"Yīshēng gěi wǒ jiǎnchá shēntǐ.", english:"The doctor examined my body." }, writing:"检 (examine) + 查 (look up/check).", tip:"Double emphasis on investigating and checking!" },
  { id:275, hanzi:"简单", pinyin:"jiǎndān", meaning:"simple; not complicated", category:"Adjectives", example:{ hanzi:"这个考试很简单。", pinyin:"Zhège kǎoshì hěn jiǎndān.", english:"This exam is very simple." }, writing:"简 (simple/bamboo) + 单 (single).", tip:"A single (单) bamboo strip (简) = basic, SIMPLE." },
  { id:276, hanzi:"件", pinyin:"jiàn", meaning:"(measure word for clothes/matters)", category:"Grammar", example:{ hanzi:"这件衣服很漂亮。", pinyin:"Zhè jiàn yīfu hěn piàoliang.", english:"This piece of clothing is very pretty." }, writing:"亻(person) + 牛 (cow).", tip:"A person counting items one by one like a farmer counting cows." },
  { id:277, hanzi:"健康", pinyin:"jiànkāng", meaning:"healthy; health", category:"Body", example:{ hanzi:"祝你身体健康！", pinyin:"Zhù nǐ shēntǐ jiànkāng!", english:"Wish you good health!" }, writing:"健 (strong) + 康 (peaceful/healthy).", tip:"A strong (健) and peaceful (康) body = HEALTHY." },
  { id:278, hanzi:"见面", pinyin:"jiànmiàn", meaning:"to meet; to see each other", category:"Actions", example:{ hanzi:"我们明天见面吧。", pinyin:"Wǒmen míngtiān jiànmiàn ba.", english:"Let's meet tomorrow." }, writing:"见 (see) + 面 (face).", tip:"To see (见) each other's faces (面) = TO MEET." },
  { id:279, hanzi:"讲", pinyin:"jiǎng", meaning:"to speak; to explain", category:"Actions", example:{ hanzi:"请你给我讲讲。", pinyin:"Qǐng nǐ gěi wǒ jiǎng jiang.", english:"Please explain it to me." }, writing:"讠(speech) + 井 (well).", tip:"Speech flowing deeply like water from a well = EXPLAINING." },
  { id:280, hanzi:"角", pinyin:"jiǎo", meaning:"horn; angle; 10 cents", category:"Money", example:{ hanzi:"这个苹果五角钱。", pinyin:"Zhège píngguǒ wǔ jiǎo qián.", english:"This apple costs 50 cents." }, writing:"A pictograph of an animal horn.", tip:"A horn or corner. In money, a corner/fraction of a Yuan (10 cents)." },
  { id:281, hanzi:"脚", pinyin:"jiǎo", meaning:"foot", category:"Body", example:{ hanzi:"我的脚很疼。", pinyin:"Wǒ de jiǎo hěn téng.", english:"My foot hurts." }, writing:"月 (flesh/body part) + 却 (retreat).", tip:"The body part (月) you use to retreat or walk away." },
  { id:282, hanzi:"教", pinyin:"jiāo", meaning:"to teach", category:"Actions", example:{ hanzi:"他教我汉语。", pinyin:"Tā jiāo wǒ Hànyǔ.", english:"He teaches me Chinese." }, writing:"孝 (filial piety) + 攵 (hand doing).", tip:"A hand (攵) guiding a child to learn proper values (孝)." },
  { id:283, hanzi:"教室", pinyin:"jiàoshì", meaning:"classroom", category:"Places", example:{ hanzi:"我们在教室上课。", pinyin:"Wǒmen zài jiàoshì shàngkè.", english:"We have class in the classroom." }, writing:"教 (teach) + 室 (room).", tip:"The room (室) where teaching (教) happens = CLASSROOM." },
  { id:284, hanzi:"接", pinyin:"jiē", meaning:"to receive; to pick up (someone)", category:"Actions", example:{ hanzi:"我去机场接你。", pinyin:"Wǒ qù jīchǎng jiē nǐ.", english:"I will go to the airport to pick you up." }, writing:"扌(hand) + 妾 (concubine/close).", tip:"Using your hand (扌) to bring someone close to you." },
  { id:285, hanzi:"街道", pinyin:"jiēdào", meaning:"street", category:"Places", example:{ hanzi:"这条街道很干净。", pinyin:"Zhè tiáo jiēdào hěn gānjìng.", english:"This street is very clean." }, writing:"街 (street) + 道 (path).", tip:"The public path (道) where shops and streets (街) are." },
  { id:286, hanzi:"节目", pinyin:"jiémù", meaning:"program; show", category:"Entertainment", example:{ hanzi:"这个电视节目很好看。", pinyin:"Zhège diànshì jiémù hěn hǎokàn.", english:"This TV program is very good." }, writing:"节 (segment) + 目 (eye/item).", tip:"Segments (节) to be watched by the eye (目) = TV SHOW." },
  { id:287, hanzi:"节日", pinyin:"jiérì", meaning:"festival; holiday", category:"Time", example:{ hanzi:"春节是中国最重要的节日。", pinyin:"Chūnjié shì Zhōngguó zuì zhòngyào de jiérì.", english:"Spring Festival is China's most important holiday." }, writing:"节 (node/festival) + 日 (day).", tip:"The special nodes/days (日) of the year = FESTIVALS." },
  { id:288, hanzi:"结婚", pinyin:"jiéhūn", meaning:"to marry; to get married", category:"People", example:{ hanzi:"他们明年结婚。", pinyin:"Tāmen míngnián jiéhūn.", english:"They are getting married next year." }, writing:"结 (tie/knot) + 婚 (marriage).", tip:"Tying (结) the knot of marriage (婚)." },
  { id:289, hanzi:"结束", pinyin:"jiéshù", meaning:"to end; to finish", category:"Actions", example:{ hanzi:"会议结束了。", pinyin:"Huìyì jiéshù le.", english:"The meeting has ended." }, writing:"结 (tie/knot) + 束 (bind).", tip:"Tying the final knot and binding everything up = FINISH." },
  { id:290, hanzi:"解决", pinyin:"jiějué", meaning:"to solve; to resolve", category:"Actions", example:{ hanzi:"这个问题很难解决。", pinyin:"Zhège wèntí hěn nán jiějué.", english:"This problem is hard to solve." }, writing:"解 (untie) + 决 (decide).", tip:"Untying (解) the knotty problem and deciding (决) the outcome." },
  { id:291, hanzi:"借", pinyin:"jiè", meaning:"to borrow; to lend", category:"Actions", example:{ hanzi:"我能借你的书吗？", pinyin:"Wǒ néng jiè nǐ de shū ma?", english:"Can I borrow your book?" }, writing:"亻(person) + 昔 (past).", tip:"A person taking something to return it based on a past agreement." },
  { id:292, hanzi:"经常", pinyin:"jīngcháng", meaning:"often; frequently", category:"Time", example:{ hanzi:"我经常去图书馆。", pinyin:"Wǒ jīngcháng qù túshūguǎn.", english:"I often go to the library." }, writing:"经 (pass through) + 常 (often).", tip:"Passing through an action constantly = OFTEN." },
  { id:293, hanzi:"经过", pinyin:"jīngguò", meaning:"to pass by; through", category:"Actions", example:{ hanzi:"我去学校经过公园。", pinyin:"Wǒ qù xuéxiào jīngguò gōngyuán.", english:"I pass by the park on my way to school." }, writing:"经 (pass) + 过 (cross over).", tip:"To pass (经) and cross over (过) a place." },
  { id:294, hanzi:"经理", pinyin:"jīnglǐ", meaning:"manager", category:"People", example:{ hanzi:"他是我们公司的经理。", pinyin:"Tā shì wǒmen gōngsī de jīnglǐ.", english:"He is the manager of our company." }, writing:"经 (manage) + 理 (reason/logic).", tip:"The one who manages (经) with logic and reason (理)." },
  { id:295, hanzi:"久", pinyin:"jiǔ", meaning:"long time", category:"Time", example:{ hanzi:"好久不见！", pinyin:"Hǎojiǔ bú jiàn!", english:"Long time no see!" }, writing:"A pictograph of a person supporting something from behind for a long time.", tip:"Someone leaning back to sustain a LONG TIME." },
  { id:296, hanzi:"旧", pinyin:"jiù", meaning:"old; used (objects)", category:"Adjectives", example:{ hanzi:"这辆自行车很旧。", pinyin:"Zhè liàng zìxíngchē hěn jiù.", english:"This bicycle is very old." }, writing:"丨 (vertical line) + 日 (sun/day).", Object:"Used for objects, unlike 老 which is for people." },
  { id:297, hanzi:"举行", pinyin:"jǔxíng", meaning:"to hold (a meeting/event)", category:"Actions", example:{ hanzi:"明天学校举行比赛。", pinyin:"Míngtiān xuéxiào jǔxíng bǐsài.", english:"The school will hold a competition tomorrow." }, writing:"举 (lift/raise) + 行 (action).", tip:"Lifting up (举) an action/event (行) to the public." },
  { id:298, hanzi:"句子", pinyin:"jùzi", meaning:"sentence", category:"Grammar", example:{ hanzi:"请读一下这个句子。", pinyin:"Qǐng dú yīxià zhège jùzi.", english:"Please read this sentence." }, writing:"句 (sentence) + 子 (noun suffix).", tip:"A mouth (口) making a complete package (勹) of words = SENTENCE." },
  { id:299, hanzi:"决定", pinyin:"juédìng", meaning:"to decide; decision", category:"Actions", example:{ hanzi:"我已经决定了。", pinyin:"Wǒ yǐjīng juédìng le.", english:"I have already decided." }, writing:"决 (decide) + 定 (fix/settle).", tip:"Deciding (决) and settling it firmly (定)." },
  { id:300, hanzi:"渴", pinyin:"kě", meaning:"thirsty", category:"Emotions", example:{ hanzi:"我口渴了，想喝水。", pinyin:"Wǒ kǒu kě le, xiǎng hē shuǐ.", english:"I am thirsty, I want to drink water." }, writing:"氵(water) + 曷 (why/call).", tip:"Crying out (曷) for water (氵) because you are THIRSTY!" },
  { id:301, hanzi:"可爱", pinyin:"kě'ài", meaning:"cute; lovely", category:"Adjectives", example:{ hanzi:"你的猫真可爱。", pinyin:"Nǐ de māo zhēn kě'ài.", english:"Your cat is really cute." }, writing:"可 (can/able) + 爱 (love).", tip:"Able to be loved = LOVABLE / CUTE." },
  { id:302, hanzi:"客人", pinyin:"kèrén", meaning:"guest; customer", category:"People", example:{ hanzi:"今天家里有客人。", pinyin:"Jīntiān jiālǐ yǒu kèrén.", english:"There are guests at home today." }, writing:"客 (guest) + 人 (person).", tip:"A person (人) visiting your home as a guest (客)." },
  { id:303, hanzi:"空调", pinyin:"kōngtiáo", meaning:"air conditioning", category:"Objects", example:{ hanzi:"请打开空调。", pinyin:"Qǐng dǎkāi kōngtiáo.", english:"Please turn on the air conditioner." }, writing:"空 (air) + 调 (adjust).", tip:"The machine that adjusts (调) the air (空)!" },
  { id:304, hanzi:"口", pinyin:"kǒu", meaning:"mouth; (measure word for family members)", category:"Grammar", example:{ hanzi:"我家有三口人。", pinyin:"Wǒ jiā yǒu sān kǒu rén.", english:"There are three people in my family." }, writing:"A square pictograph representing an open mouth.", tip:"Literally an open mouth. Also counts 'mouths to feed' in a family." },
  { id:305, hanzi:"哭", pinyin:"kū", meaning:"to cry", category:"Actions", example:{ hanzi:"那个孩子在哭。", pinyin:"Nàgè háizi zài kū.", english:"That child is crying." }, writing:"Two mouths (口口) + 犬 (dog).", tip:"Two eyes/mouths weeping loudly like a howling dog." },
  { id:306, hanzi:"裤子", pinyin:"kùzi", meaning:"pants; trousers", category:"Objects", example:{ hanzi:"我买了一条新裤子。", pinyin:"Wǒ mǎile yī tiáo xīn kùzi.", english:"I bought new pants." }, writing:"衤(clothing) + 库 (storehouse).", tip:"Clothing (衤) that stores/covers your legs." },
  { id:307, hanzi:"筷子", pinyin:"kuàizi", meaning:"chopsticks", category:"Objects", example:{ hanzi:"我会用筷子。", pinyin:"Wǒ huì yòng kuàizi.", english:"I can use chopsticks." }, writing:"⺮(bamboo) + 快 (fast).", tip:"Bamboo (⺮) tools that help you eat fast (快)!" },
  { id:308, hanzi:"蓝", pinyin:"lán", meaning:"blue", category:"Colors", example:{ hanzi:"蓝色的天空很美。", pinyin:"Lánsè de tiānkōng hěn měi.", english:"The blue sky is beautiful." }, writing:"艹 (grass) + 监 (inspect).", tip:"Indigo blue originally came from a plant (艹)." },
  { id:309, hanzi:"老", pinyin:"lǎo", meaning:"old (people); elderly", category:"Adjectives", example:{ hanzi:"我的爷爷很老了。", pinyin:"Wǒ de yéye hěn lǎo le.", english:"My grandpa is very old." }, writing:"A pictograph of an old person with a cane.", tip:"An old person leaning on a walking stick." },
  { id:310, hanzi:"离开", pinyin:"líkāi", meaning:"to leave; to depart", category:"Actions", example:{ hanzi:"他昨天离开北京了。", pinyin:"Tā zuótiān líkāi Běijīng le.", english:"He left Beijing yesterday." }, writing:"离 (leave) + 开 (open/away).", tip:"Opening (开) the door to leave and separate (离)." },
  { id:311, hanzi:"礼物", pinyin:"lǐwù", meaning:"gift; present", category:"Objects", example:{ hanzi:"这是给你的礼物。", pinyin:"Zhè shì gěi nǐ de lǐwù.", english:"This is a gift for you." }, writing:"礼 (ceremony/courtesy) + 物 (thing).", tip:"A thing (物) given out of courtesy (礼) = GIFT." },
  { id:312, hanzi:"历史", pinyin:"lìshǐ", meaning:"history", category:"Education", example:{ hanzi:"我喜欢学习历史。", pinyin:"Wǒ xǐhuān xuéxí lìshǐ.", english:"I like studying history." }, writing:"历 (experience) + 史 (history).", tip:"The experiences (历) recorded over time = HISTORY." },
  { id:313, hanzi:"脸", pinyin:"liǎn", meaning:"face", category:"Body", example:{ hanzi:"去洗洗脸吧。", pinyin:"Qù xǐ xi liǎn ba.", english:"Go wash your face." }, writing:"月 (flesh/body) + 佥 (all).", tip:"The body part (月) that shows all (佥) your expressions." },
  { id:314, hanzi:"练习", pinyin:"liànxí", meaning:"to practice; exercise", category:"Actions", example:{ hanzi:"我要多练习听力。", pinyin:"Wǒ yào duō liànxí tīnglì.", english:"I need to practice listening more." }, writing:"练 (practice) + 习 (study/habit).", tip:"Practicing (练) until it becomes a habit (习)." },
  { id:315, hanzi:"辆", pinyin:"liàng", meaning:"(measure word for vehicles)", category:"Grammar", example:{ hanzi:"我家有两辆车。", pinyin:"Wǒ jiā yǒu liǎng liàng chē.", english:"My family has two cars." }, writing:"车 (vehicle) + 两 (two/weight).", tip:"A measure word specifically starting with the vehicle (车) radical." },
  { id:316, hanzi:"了解", pinyin:"liǎojiě", meaning:"to understand; to know about", category:"Actions", example:{ hanzi:"我很了解他。", pinyin:"Wǒ hěn liǎojiě tā.", english:"I know him very well." }, writing:"了 (finish/clear) + 解 (untie/explain).", tip:"Untying a knot to make everything clear (了) = UNDERSTAND." },
  { id:317, hanzi:"邻居", pinyin:"línjū", meaning:"neighbor", category:"People", example:{ hanzi:"我的邻居很好。", pinyin:"Wǒ de línjū hěn hǎo.", english:"My neighbor is very nice." }, writing:"邻 (neighboring) + 居 (reside).", tip:"The person residing (居) next to you." },
  { id:318, hanzi:"零", pinyin:"líng", meaning:"zero", category:"Numbers", example:{ hanzi:"现在是零度。", pinyin:"Xiànzài shì líng dù.", english:"It is zero degrees now." }, writing:"雨 (rain) + 令 (command).", tip:"Zero drops of rain. Very complex character for nothing!" },
  { id:319, hanzi:"楼", pinyin:"lóu", meaning:"building; floor", category:"Places", example:{ hanzi:"他在五楼。", pinyin:"Tā zài wǔ lóu.", english:"He is on the 5th floor." }, writing:"木 (wood) + 娄 (stack).", tip:"Wooden (木) structures stacked (娄) on top of each other = FLOORS." },
  { id:320, margin:"绿", pinyin:"lǜ", meaning:"green", category:"Colors", example:{ hanzi:"树叶是绿色的。", pinyin:"Shùyè shì lǜsè de.", english:"The leaves are green." }, writing:"纟(silk) + 录 (record/peel).", tip:"Silk (纟) dyed the color of peeled tree bark." },
  { id:321, hanzi:"马", pinyin:"mǎ", meaning:"horse", category:"Animals", example:{ hanzi:"他骑着一匹马。", pinyin:"Tā qí zhe yī pǐ mǎ.", english:"He is riding a horse." }, writing:"A pictograph of a galloping horse.", tip:"Look at the flying mane and four legs running!" },
  { id:322, hanzi:"马上", pinyin:"mǎshàng", meaning:"immediately; right away", category:"Time", example:{ hanzi:"我马上就来。", pinyin:"Wǒ mǎshàng jiù lái.", english:"I will come immediately." }, writing:"马 (horse) + 上 (on/up).", tip:"Jumping 'on a horse' (马上) to do it FAST = IMMEDIATELY!" },
  { id:323, hanzi:"满意", pinyin:"mǎnyì", meaning:"satisfied; pleased", category:"Emotions", example:{ hanzi:"我对这件衣服很满意。", pinyin:"Wǒ duì zhè jiàn yīfu hěn mǎnyì.", english:"I am very satisfied with these clothes." }, writing:"满 (full) + 意 (meaning/heart).", tip:"Your heart's desire is completely full (满) = SATISFIED." },
  { id:324, hanzi:"帽子", pinyin:"màozi", meaning:"hat; cap", category:"Objects", example:{ hanzi:"他戴着黑色的帽子。", pinyin:"Tā dài zhe hēisè de màozi.", english:"He is wearing a black hat." }, writing:"巾 (cloth) + 冒 (cover).", tip:"A cloth (巾) used to cover your head." },
  { id:325, hanzi:"每次", pinyin:"měicì", meaning:"every time", category:"Time", example:{ hanzi:"每次看到他，我都很高兴。", pinyin:"Měicì kàndào tā, wǒ dōu hěn gāoxìng.", english:"Every time I see him, I am happy." }, writing:"每 (every) + 次 (time/occurrence).", tip:"Every (每) single time (次)." }

  { id:326, hanzi:"妹妹", pinyin:"mèimei", meaning:"younger sister", category:"Family", example:{ hanzi:"我妹妹很喜欢画画。", pinyin:"Wǒ mèimei hěn xǐhuān huàhuà.", english:"My younger sister likes drawing very much." }, writing:"女 (woman/female) + 未 (not yet).", tip:"A female (女) who is 'not yet' (未) fully grown = YOUNGER SISTER." },
  { id:327, hanzi:"门", pinyin:"mén", meaning:"door; gate", category:"Objects", example:{ hanzi:"请开门。", pinyin:"Qǐng kāimén.", english:"Please open the door." }, writing:"A pictograph of a double door.", tip:"Looks exactly like a saloon door swinging open!" },
  { id:328, hanzi:"梦", pinyin:"mèng", meaning:"dream", category:"Entertainment", example:{ hanzi:"我做了一个好梦。", pinyin:"Wǒ zuò le yīgè hǎo mèng.", english:"I had a good dream." }, writing:"林 (woods) + 夕 (evening).", tip:"Wandering through the woods (林) in the evening (夕) of your mind = DREAM." },
  { id:329, hanzi:"密码", pinyin:"mìmǎ", meaning:"password", category:"Technology", example:{ hanzi:"我的手机密码是六个零。", pinyin:"Wǒ de shǒujī mìmǎ shì liù gè líng.", english:"My phone password is six zeros." }, writing:"密 (secret) + 码 (code).", tip:"A secret (密) code (码) = PASSWORD." },
  { id:330, hanzi:"面包", pinyin:"miànbāo", meaning:"bread", category:"Food", example:{ hanzi:"我早上吃面包。", pinyin:"Wǒ zǎoshang chī miànbāo.", english:"I eat bread in the morning." }, writing:"面 (flour/noodle) + 包 (wrap/bun).", tip:"A bun (包) made of flour (面) = BREAD." },
  { id:331, hanzi:"面条", pinyin:"miàntiáo", meaning:"noodles", category:"Food", example:{ hanzi:"我想吃面条。", pinyin:"Wǒ xiǎng chī miàntiáo.", english:"I want to eat noodles." }, writing:"面 (flour/dough) + 条 (strip).", tip:"Strips (条) made out of dough (面) = NOODLES." },
  { id:332, hanzi:"免费", pinyin:"miǎnfèi", meaning:"free (of charge)", category:"Money", example:{ hanzi:"这个活动是免费的。", pinyin:"Zhège huódòng shì miǎnfèi de.", english:"This event is free." }, writing:"免 (exempt) + 费 (fee/cost).", tip:"Exempt (免) from paying the fee (费)." },
  { id:333, hanzi:"拿", pinyin:"ná", meaning:"to take; to hold", category:"Actions", example:{ hanzi:"他手里拿着一本书。", pinyin:"Tā shǒu lǐ ná zhe yī běn shū.", english:"He is holding a book in his hand." }, writing:"合 (join) + 手 (hand).", tip:"Bringing your hands (手) together (合) to TAKE something." },
  { id:334, hanzi:"奶奶", pinyin:"nǎinai", meaning:"grandmother (paternal)", category:"Family", example:{ hanzi:"奶奶今年八十岁了。", pinyin:"Nǎinai jīnnián bāshí suì le.", english:"Grandma is 80 years old this year." }, writing:"女 (woman) + 乃 (then/sound).", tip:"The respected older woman (女) of the family." },
  { id:335, hanzi:"男", pinyin:"nán", meaning:"male", category:"People", example:{ hanzi:"他是男生。", pinyin:"Tā shì nánshēng.", english:"He is a boy/male." }, writing:"田 (field) + 力 (power/strength).", tip:"The one using strength (力) to work in the field (田) = MALE." },
  { id:336, hanzi:"南", pinyin:"nán", meaning:"south", category:"Direction", example:{ hanzi:"鸟往南飞。", pinyin:"Niǎo wǎng nán fēi.", english:"Birds fly south." }, writing:"十 (ten) + 冂 (border) + 羊 (sheep).", tip:"Ancient pictograph of a bell pointing to the warm south." },
  { id:337, hanzi:"难", pinyin:"nán", meaning:"difficult; hard", category:"Adjectives", example:{ hanzi:"这个汉字很难。", pinyin:"Zhège Hànzì hěn nán.", english:"This Chinese character is very difficult." }, writing:"又 (again) + 隹 (bird).", tip:"Catching a bird (隹) again and again is DIFFICULT." },
  { id:338, hanzi:"难过", pinyin:"nánguò", meaning:"sad; grieved", category:"Emotions", example:{ hanzi:"他没考好，很难过。", pinyin:"Tā méi kǎo hǎo, hěn nánguò.", english:"He didn't do well on the exam, he is sad." }, writing:"难 (hard) + 过 (pass).", tip:"When time is hard (难) to pass (过) because you are SAD." },
  { id:339, hanzi:"年级", pinyin:"niánjí", meaning:"grade; year (in school)", category:"Education", example:{ hanzi:"我是一年级的学生。", pinyin:"Wǒ shì yī niánjí de xuéshēng.", english:"I am a first-grade student." }, writing:"年 (year) + 级 (level).", tip:"Your level (级) for the year (年) at school." },
  { id:340, hanzi:"年轻", pinyin:"niánqīng", meaning:"young", category:"Adjectives", example:{ hanzi:"老师很年轻。", pinyin:"Lǎoshī hěn niánqīng.", english:"The teacher is very young." }, writing:"年 (year) + 轻 (light/weight).", tip:"Having 'light' (轻) years (年) = YOUNG." },
  { id:341, hanzi:"鸟", pinyin:"niǎo", meaning:"bird", category:"Animals", example:{ hanzi:"树上有一只鸟。", pinyin:"Shù shang yǒu yī zhī niǎo.", english:"There is a bird in the tree." }, writing:"A pictograph of a bird with a dot for its eye.", tip:"You can see the bird's head, eye (the dot), body, and tail feathers!" },
  { id:342, hanzi:"努力", pinyin:"nǔlì", meaning:"hardworking; to strive", category:"Actions", example:{ hanzi:"他工作很努力。", pinyin:"Tā gōngzuò hěn nǔlì.", english:"He works very hard." }, writing:"努 (exert) + 力 (strength).", tip:"Exerting all your strength (力) = HARDWORKING." },
  { id:343, hanzi:"爬山", pinyin:"páshān", meaning:"to climb a mountain", category:"Activities", example:{ hanzi:"周末我们去爬山。", pinyin:"Zhōumò wǒmen qù páshān.", english:"We are going mountain climbing this weekend." }, writing:"爬 (crawl/climb) + 山 (mountain).", tip:"To crawl/climb (爬) up the mountain (山)." },
  { id:344, hanzi:"盘子", pinyin:"pánzi", meaning:"plate; dish", category:"Objects", example:{ hanzi:"盘子里有苹果。", pinyin:"Pánzi lǐ yǒu píngguǒ.", english:"There are apples on the plate." }, writing:"舟 (boat) + 皿 (dish radical).", tip:"A shallow dish (皿) shaped somewhat like a flat boat (舟)." },
  { id:345, hanzi:"胖", pinyin:"pàng", meaning:"fat; plump", category:"Adjectives", example:{ hanzi:"这只猫很胖。", pinyin:"Zhè zhī māo hěn pàng.", english:"This cat is very fat." }, writing:"月 (flesh) + 半 (half).", tip:"Flesh (月) expanding to take up another half (半) of space." },
  { id:346, hanzi:"跑步", pinyin:"pǎobù", meaning:"to run; to jog", category:"Activities", example:{ hanzi:"我喜欢每天跑步。", pinyin:"Wǒ xǐhuān měitiān pǎobù.", english:"I like running every day." }, writing:"跑 (run) + 步 (step).", tip:"Taking steps (步) to run (跑)." },
  { id:347, hanzi:"便宜", pinyin:"piányi", meaning:"cheap; inexpensive", category:"Money", example:{ hanzi:"这件衣服很便宜。", pinyin:"Zhè jiàn yīfu hěn piányi.", english:"This clothing is very cheap." }, writing:"便 (convenient) + 宜 (suitable).", tip:"A price that is suitable (宜) and convenient for your wallet = CHEAP." },
  { id:348, hanzi:"票", pinyin:"piào", meaning:"ticket", category:"Objects", example:{ hanzi:"我买了两张电影票。", pinyin:"Wǒ mǎile liǎng zhāng diànyǐng piào.", english:"I bought two movie tickets." }, writing:"西 (west) + 示 (show).", tip:"A document shown (示) to gain entry." },
  { id:349, hanzi:"漂亮", pinyin:"piàoliang", meaning:"beautiful; pretty", category:"Adjectives", example:{ hanzi:"你的裙子真漂亮。", pinyin:"Nǐ de qúnzi zhēn piàoliang.", english:"Your skirt is really beautiful." }, writing:"漂 (float) + 亮 (bright).", tip:"Someone so beautiful they seem to float (漂) brightly (亮)." },
  { id:350, hanzi:"葡萄", pinyin:"pútao", meaning:"grape", category:"Food", example:{ hanzi:"我喜欢吃葡萄。", pinyin:"Wǒ xǐhuān chī pútao.", english:"I like to eat grapes." }, writing:"Both characters have the 艹 (grass/plant) radical.", tip:"Plants (艹) hanging on vines = GRAPES." },
  { id:351, hanzi:"骑", pinyin:"qí", meaning:"to ride (an animal or bike)", category:"Actions", example:{ hanzi:"他每天骑自行车上班。", pinyin:"Tā měitiān qí zìxíngchē shàngbān.", english:"He rides a bike to work every day." }, writing:"马 (horse) + 奇 (strange/wonder).", tip:"Riding on a horse (马)." },
  { id:352, hanzi:"起床", pinyin:"qǐchuáng", meaning:"to get up (from bed)", category:"Actions", example:{ hanzi:"我早上七点起床。", pinyin:"Wǒ zǎoshang qī diǎn qǐchuáng.", english:"I get up at 7 AM." }, writing:"起 (rise) + 床 (bed).", tip:"To rise (起) from the bed (床)." },
  { id:353, hanzi:"铅笔", pinyin:"qiānbǐ", meaning:"pencil", category:"Objects", example:{ hanzi:"借我一支铅笔，好吗？", pinyin:"Jiè wǒ yī zhī qiānbǐ, hǎo ma?", english:"Lend me a pencil, okay?" }, writing:"铅 (lead) + 笔 (pen).", tip:"A pen (笔) made of lead (铅) = PENCIL." },
  { id:354, hanzi:"清楚", pinyin:"qīngchu", meaning:"clear; distinct", category:"Adjectives", example:{ hanzi:"我看得很清楚。", pinyin:"Wǒ kàn de hěn qīngchu.", english:"I can see very clearly." }, writing:"清 (clear water) + 楚 (neat).", tip:"As clear (清) as pure water." },
  { id:355, hanzi:"晴", pinyin:"qíng", meaning:"sunny; clear (weather)", category:"Weather", example:{ hanzi:"今天是晴天。", pinyin:"Jīntiān shì qíngtiān.", english:"Today is a sunny day." }, writing:"日 (sun) + 青 (blue/green).", tip:"The sun (日) shining in a clear blue (青) sky." },
  { id:356, hanzi:"去年", pinyin:"qùnián", meaning:"last year", category:"Time", example:{ hanzi:"我去年去了中国。", pinyin:"Wǒ qùnián qù le Zhōngguó.", english:"I went to China last year." }, writing:"去 (gone) + 年 (year).", tip:"The year (年) that has already gone (去) = LAST YEAR." },
  { id:357, hanzi:"裙子", pinyin:"qúnzi", meaning:"skirt", category:"Objects", example:{ hanzi:"这条裙子很长。", pinyin:"Zhè tiáo qúnzi hěn cháng.", english:"This skirt is very long." }, writing:"衤 (clothing) + 君 (ruler).", tip:"Clothing (衤) worn below the waist." },
  { id:358, hanzi:"让", pinyin:"ràng", meaning:"to let; to allow; to make", category:"Actions", example:{ hanzi:"妈妈不让我去。", pinyin:"Māma bù ràng wǒ qù.", english:"Mom doesn't let me go." }, writing:"讠 (speech) + 上 (up).", tip:"Using words (讠) to permit or yield to someone." },
  { id:359, hanzi:"认真", pinyin:"rènzhēn", meaning:"serious; earnest", category:"Adjectives", example:{ hanzi:"他学习很认真。", pinyin:"Tā xuéxí hěn rènzhēn.", english:"He studies very seriously." }, writing:"认 (recognize) + 真 (true/real).", tip:"Recognizing (认) the truth (真) requires EARNEST effort." },
  { id:360, hanzi:"容易", pinyin:"róngyì", meaning:"easy", category:"Adjectives", example:{ hanzi:"这个问题很容易。", pinyin:"Zhège wèntí hěn róngyì.", english:"This problem is very easy." }, writing:"容 (contain) + 易 (change/easy).", tip:"When things change smoothly, they are EASY (易)." },
  { id:361, hanzi:"伞", pinyin:"sǎn", meaning:"umbrella", category:"Objects", example:{ hanzi:"外面下雨了，带把伞吧。", pinyin:"Wàimiàn xiàyǔ le, dài bǎ sǎn ba.", english:"It's raining outside, take an umbrella." }, writing:"A pictograph of an umbrella.", tip:"Look at it! It literally looks like an open umbrella with people (人) under it." },
  { id:362, hanzi:"上网", pinyin:"shàngwǎng", meaning:"to surf the internet", category:"Technology", example:{ hanzi:"他喜欢上网玩游戏。", pinyin:"Tā xǐhuān shàngwǎng wán yóuxì.", english:"He likes surfing the internet to play games." }, writing:"上 (go up/on) + 网 (net).", tip:"Getting on (上) the web/net (网)." },
  { id:363, hanzi:"生气", pinyin:"shēngqì", meaning:"angry; to get angry", category:"Emotions", example:{ hanzi:"不要生气了。", pinyin:"Búyào shēngqì le.", english:"Don't be angry anymore." }, writing:"生 (produce) + 气 (air/gas).", tip:"Producing (生) hot air (气) from your head because you're ANGRY." },
  { id:364, hanzi:"声音", pinyin:"shēngyīn", meaning:"sound; voice", category:"General", example:{ hanzi:"他的声音很大。", pinyin:"Tā de shēngyīn hěn dà.", english:"His voice is very loud." }, writing:"声 (sound) + 音 (noise/note).", tip:"The sound (声) of music or voices (音)." },
  { id:365, hanzi:"使", pinyin:"shǐ", meaning:"to make; to cause", category:"Grammar", example:{ hanzi:"这个消息使我很高兴。", pinyin:"Zhège xiāoxi shǐ wǒ hěn gāoxìng.", english:"This news made me very happy." }, writing:"亻(person) + 吏 (official).", tip:"An official making people do things = TO CAUSE/MAKE." },
  { id:366, hanzi:"世界", pinyin:"shìjiè", meaning:"world", category:"Places", example:{ hanzi:"世界很大，我想去看看。", pinyin:"Shìjiè hěn dà, wǒ xiǎng qù kànkan.", english:"The world is big, I want to go see it." }, writing:"世 (generation/era) + 界 (boundary).", tip:"The boundaries (界) of our era (世) = THE WORLD." },
  { id:367, hanzi:"事情", pinyin:"shìqing", meaning:"matter; affair; thing", category:"General", example:{ hanzi:"我有很多事情要做。", pinyin:"Wǒ yǒu hěn duō shìqing yào zuò.", english:"I have many things to do." }, writing:"事 (matter) + 情 (feeling/situation).", tip:"A situation (情) or matter (事) you must handle." },
  { id:368, hanzi:"瘦", pinyin:"shòu", meaning:"thin; skinny", category:"Adjectives", example:{ hanzi:"她很瘦。", pinyin:"Tā hěn shòu.", english:"She is very thin." }, writing:"疒 (sickness radical) + 叟 (old man).", tip:"Looking skinny like a sick or frail old man." },
  { id:369, hanzi:"舒服", pinyin:"shūfu", meaning:"comfortable", category:"Adjectives", example:{ hanzi:"这张床很舒服。", pinyin:"Zhè zhāng chuáng hěn shūfu.", english:"This bed is very comfortable." }, writing:"舒 (stretch/relax) + 服 (clothes/serve).", tip:"Stretching out (舒) in your comfy clothes (服)." },
  { id:370, hanzi:"树", pinyin:"shù", meaning:"tree", category:"Nature", example:{ hanzi:"那棵树很高。", pinyin:"Nà kē shù hěn gāo.", english:"That tree is very tall." }, writing:"木 (wood) + 对 (right/pair).", tip:"The wooden (木) plant that grows tall = TREE." },
  { id:371, hanzi:"数学", pinyin:"shùxué", meaning:"mathematics", category:"Education", example:{ hanzi:"我的数学不好。", pinyin:"Wǒ de shùxué bù hǎo.", english:"My math is not good." }, writing:"数 (number) + 学 (study).", tip:"The study (学) of numbers (数) = MATH." },
  { id:372, hanzi:"刷牙", pinyin:"shuāyá", meaning:"to brush teeth", category:"Actions", example:{ hanzi:"睡觉前要刷牙。", pinyin:"Shuìjiào qián yào shuāyá.", english:"You must brush your teeth before sleeping." }, writing:"刷 (brush) + 牙 (tooth).", tip:"Brushing (刷) the teeth (牙)." },
  { id:373, hanzi:"双", pinyin:"shuāng", meaning:"pair; double", category:"Grammar", example:{ hanzi:"我买了一双鞋。", pinyin:"Wǒ mǎile yī shuāng xié.", english:"I bought a pair of shoes." }, writing:"Two 又 (hands/again) side by side.", tip:"Two hands next to each other = A PAIR." },
  { id:374, hanzi:"司机", pinyin:"sījī", meaning:"driver", category:"People", example:{ hanzi:"出租车司机人很好。", pinyin:"Chūzūchē sījī rén hěn hǎo.", english:"The taxi driver is very nice." }, writing:"司 (control) + 机 (machine).", tip:"The person who controls (司) the machine/car (机)." },
  { id:375, hanzi:"虽然", pinyin:"suīrán", meaning:"although; even though", category:"Grammar", example:{ hanzi:"虽然下雨，我们还是去了。", pinyin:"Suīrán xiàyǔ, wǒmen háishi qù le.", english:"Although it rained, we still went." }, writing:"虽 (although) + 然 (so).", tip:"Used to set up a contrasting condition (although...)." },
  { id:376, hanzi:"糖", pinyin:"táng", meaning:"sugar; candy", category:"Food", example:{ hanzi:"小孩喜欢吃糖。", pinyin:"Xiǎohái xǐhuān chī táng.", english:"Children like eating candy." }, writing:"米 (rice/grain) + 唐 (Tang dynasty/boast).", tip:"Sweet grains (米) = SUGAR/CANDY." },
  { id:377, hanzi:"特别", pinyin:"tèbié", meaning:"special; especially", category:"Adjectives", example:{ hanzi:"今天特别冷。", pinyin:"Jīntiān tèbié lěng.", english:"Today is especially cold." }, writing:"特 (special/bull) + 别 (separate).", tip:"Standing separate (别) from the herd makes it SPECIAL." },
  { id:378, hanzi:"疼", pinyin:"téng", meaning:"hurt; pain", category:"Body", example:{ hanzi:"我的头很疼。", pinyin:"Wǒ de tóu hěn téng.", english:"My head hurts a lot." }, writing:"疒 (sickness) + 冬 (winter).", tip:"The sickness (疒) that makes you shiver like winter (冬) = PAIN." },
  { id:379, hanzi:"体育", pinyin:"tǐyù", meaning:"sports; physical education", category:"Education", example:{ hanzi:"我喜欢上体育课。", pinyin:"Wǒ xǐhuān shàng tǐyù kè.", english:"I like attending PE class." }, writing:"体 (body) + 育 (educate).", tip:"Educating (育) and training the body (体) = PE." },
  { id:380, hanzi:"甜", pinyin:"tián", meaning:"sweet", category:"Adjectives", example:{ hanzi:"这个西瓜很甜。", pinyin:"Zhège xīguā hěn tián.", english:"This watermelon is very sweet." }, writing:"舌 (tongue) + 甘 (sweet).", tip:"What your tongue (舌) tastes when you eat sugar (甘)." },
  { id:381, hanzi:"条", pinyin:"tiáo", meaning:"(measure word for long, thin things)", category:"Grammar", example:{ hanzi:"一条鱼", pinyin:"yī tiáo yú", english:"one fish" }, writing:"夂 (walk slowly) + 木 (wood).", tip:"Used for long, flexible things like fish, pants, rivers." },
  { id:382, hanzi:"跳舞", pinyin:"tiàowǔ", meaning:"to dance", category:"Activities", example:{ hanzi:"她跳舞跳得很好。", pinyin:"Tā tiàowǔ tiào de hěn hǎo.", english:"She dances very well." }, writing:"跳 (jump) + 舞 (dance).", tip:"Jumping (跳) around rhythmically = DANCING." },
  { id:383, hanzi:"头发", pinyin:"tóufa", meaning:"hair (on the head)", category:"Body", example:{ hanzi:"他的头发变白了。", pinyin:"Tā de tóufa biàn bái le.", english:"His hair turned white." }, writing:"头 (head) + 发 (hair/issue).", tip:"The hair (发) on your head (头)." },
  { id:384, hanzi:"突然", pinyin:"tūrán", meaning:"suddenly; unexpected", category:"Time", example:{ hanzi:"突然下雨了。", pinyin:"Tūrán xiàyǔ le.", english:"It suddenly started to rain." }, writing:"突 (dash forward/dog from cave) + 然 (so).", tip:"Like a dog (犬) dashing out of a cave (穴) = SUDDEN." },
  { id:385, hanzi:"腿", pinyin:"tuǐ", meaning:"leg", category:"Body", example:{ hanzi:"我的腿酸了。", pinyin:"Wǒ de tuǐ suān le.", english:"My legs are sore." }, writing:"月 (flesh/body) + 退 (retreat).", tip:"The body part (月) used to step back or walk (退) = LEG." },
  { id:386, hanzi:"完成", pinyin:"wánchéng", meaning:"to complete; to finish", category:"Actions", example:{ hanzi:"我已经完成了工作。", pinyin:"Wǒ yǐjīng wánchéng le gōngzuò.", english:"I have already completed the work." }, writing:"完 (finish) + 成 (succeed).", tip:"Finishing (完) successfully (成)." },
  { id:387, hanzi:"玩", pinyin:"wán", meaning:"to play; to have fun", category:"Activities", example:{ hanzi:"孩子们在公园里玩。", pinyin:"Háizimen zài gōngyuán lǐ wán.", english:"The children are playing in the park." }, writing:"王 (jade) + 元 (origin/first).", tip:"Playing with precious jade toys." },
  { id:388, hanzi:"晚", pinyin:"wǎn", meaning:"late", category:"Adjectives", example:{ hanzi:"对不起，我来晚了。", pinyin:"Duìbuqǐ, wǒ lái wǎn le.", english:"Sorry, I came late." }, writing:"日 (sun) + 免 (exempt).", tip:"The sun (日) has escaped/set = it is LATE." },
  { id:389, hanzi:"晚上", pinyin:"wǎnshang", meaning:"evening; night", category:"Time", example:{ hanzi:"你晚上做什么？", pinyin:"Nǐ wǎnshang zuò shénme?", english:"What are you doing this evening?" }, writing:"晚 (late) + 上 (on).", tip:"The late (晚) part of the day = EVENING." },
  { id:390, hanzi:"万", pinyin:"wàn", meaning:"ten thousand", category:"Numbers", example:{ hanzi:"这辆车要十万块。", pinyin:"Zhè liàng chē yào shí wàn kuài.", english:"This car costs 100,000 yuan." }, writing:"A simplified form representing a swarm of insects.", tip:"An unimaginably large number for the ancients: 10,000." },
  { id:391, hanzi:"忘记", pinyin:"wàngjì", meaning:"to forget", category:"Actions", example:{ hanzi:"我忘记了他的名字。", pinyin:"Wǒ wàngjì le tā de míngzi.", english:"I forgot his name." }, writing:"忘 (forget: lose+heart) + 记 (memorize).", tip:"Losing (亡) the memory from your heart (心) = FORGET." },
  { id:392, hanzi:"为", pinyin:"wèi", meaning:"for", category:"Grammar", example:{ hanzi:"我为你高兴。", pinyin:"Wǒ wèi nǐ gāoxìng.", english:"I am happy for you." }, writing:"Simplified from an elephant being led.", tip:"Doing something FOR someone else." },
  { id:393, hanzi:"为了", pinyin:"wèile", meaning:"in order to; for the sake of", category:"Grammar", example:{ hanzi:"为了健康，他不抽烟了。", pinyin:"Wèile jiànkāng, tā bù chōuyān le.", english:"For the sake of health, he stopped smoking." }, writing:"为 (for) + 了 (particle).", tip:"Shows the purpose or goal of an action." },
  { id:394, hanzi:"为什么", pinyin:"wèishénme", meaning:"why", category:"Questions", example:{ hanzi:"你为什么不高兴？", pinyin:"Nǐ wèishénme bù gāoxìng?", english:"Why are you unhappy?" }, writing:"为 (for) + 什么 (what).", tip:"Literal translation: For (为) what (什么)? = WHY?" },
  { id:395, hanzi:"位", pinyin:"wèi", meaning:"(polite measure word for people)", category:"Grammar", example:{ hanzi:"这位老师很好。", pinyin:"Zhè wèi lǎoshī hěn hǎo.", english:"This teacher is very good." }, writing:"亻(person) + 立 (stand).", tip:"A person (亻) standing (立) in a position of respect." },
  { id:396, hanzi:"文化", pinyin:"wénhuà", meaning:"culture", category:"General", example:{ hanzi:"我对中国文化感兴趣。", pinyin:"Wǒ duì Zhōngguó wénhuà gǎn xìngqù.", english:"I am interested in Chinese culture." }, writing:"文 (text/civilization) + 化 (transform).", tip:"How civilization (文) transforms (化) society = CULTURE." },
  { id:397, hanzi:"问", pinyin:"wèn", meaning:"to ask", category:"Actions", example:{ hanzi:"我可以问一个问题吗？", pinyin:"Wǒ kěyǐ wèn yīgè wèntí ma?", english:"Can I ask a question?" }, writing:"门 (door) + 口 (mouth).", tip:"A mouth (口) at the door (门) asking for entry or information." },
  { id:398, hanzi:"问题", pinyin:"wèntí", meaning:"question; problem", category:"General", example:{ hanzi:"没问题！", pinyin:"Méi wèntí!", english:"No problem!" }, writing:"问 (ask) + 题 (topic/subject).", tip:"A topic (题) that needs to be asked (问) about = QUESTION." },
  { id:399, hanzi:"习惯", pinyin:"xíguàn", meaning:"habit; to be used to", category:"General", example:{ hanzi:"这是我的习惯。", pinyin:"Zhè shì wǒ de xíguàn.", english:"This is my habit." }, writing:"习 (practice) + 惯 (accustomed).", tip:"Practicing (习) until you are accustomed (惯) to it = HABIT." },
  { id:400, hanzi:"洗", pinyin:"xǐ", meaning:"to wash", category:"Actions", example:{ hanzi:"我每天洗澡。", pinyin:"Wǒ měitiān xǐzǎo.", english:"I take a shower every day." }, writing:"氵(water) + 先 (first).", tip:"Using water (氵) to clean things first (先)." }

  { id:401, hanzi:"洗手间", pinyin:"xǐshǒujiān", meaning:"restroom", category:"Places", example:{ hanzi:"洗手间在哪儿？", pinyin:"Xǐshǒujiān zài nǎr?", english:"Where is the restroom?" }, writing:"洗(wash) + 手(hand) + 间(room).", tip:"The room (间) for washing (洗) hands (手) = RESTROOM." },
  { id:402, hanzi:"洗澡", pinyin:"xǐzǎo", meaning:"to take a shower", category:"Actions", example:{ hanzi:"我每天洗澡。", pinyin:"Wǒ měitiān xǐzǎo.", english:"I take a shower every day." }, writing:"洗 (wash) + 澡 (bathe).", tip:"Both characters have the water radical (氵). Splashing water!" },
  { id:403, hanzi:"夏", pinyin:"xià", meaning:"summer", category:"Time", example:{ hanzi:"夏天很热。", pinyin:"Xiàtiān hěn rè.", english:"Summer is very hot." }, writing:"A pictograph of an ancient mask/dancer.", tip:"Dancing in the hot summer sun." },
  { id:404, hanzi:"先", pinyin:"xiān", meaning:"first; earlier", category:"Time", example:{ hanzi:"你先走吧。", pinyin:"Nǐ xiān zǒu ba.", english:"You go first." }, writing:"牛 (cow) + 儿 (legs).", tip:"The cow's legs stepping out FIRST." },
  { id:405, hanzi:"先生", pinyin:"xiānsheng", meaning:"Mr.; husband", category:"People", example:{ hanzi:"王先生你好。", pinyin:"Wáng xiānsheng nǐ hǎo.", english:"Hello, Mr. Wang." }, writing:"先 (first) + 生 (born).", tip:"Someone 'born first' is an elder or mister." },
  { id:406, hanzi:"现在", pinyin:"xiànzài", meaning:"now", category:"Time", example:{ hanzi:"现在几点？", pinyin:"Xiànzài jǐ diǎn?", english:"What time is it now?" }, writing:"现 (appear) + 在 (at).", tip:"Appearing at this exact moment = NOW." },
  { id:407, hanzi:"香蕉", pinyin:"xiāngjiāo", meaning:"banana", category:"Food", example:{ hanzi:"我想吃香蕉。", pinyin:"Wǒ xiǎng chī xiāngjiāo.", english:"I want to eat a banana." }, writing:"香 (fragrant) + 蕉 (broadleaf plant).", tip:"The fragrant (香) fruit of the plant = BANANA." },
  { id:408, hanzi:"相同", pinyin:"xiāngtóng", meaning:"identical; same", category:"Adjectives", example:{ hanzi:"我们的衣服相同。", pinyin:"Wǒmen de yīfu xiāngtóng.", english:"Our clothes are identical." }, writing:"相 (mutual) + 同 (same).", tip:"Mutually the same." },
  { id:409, hanzi:"相信", pinyin:"xiāngxìn", meaning:"to believe", category:"Actions", example:{ hanzi:"我相信你。", pinyin:"Wǒ xiāngxìn nǐ.", english:"I believe you." }, writing:"相 (mutual) + 信 (trust/letter).", tip:"Having mutual trust (信) = BELIEVE." },
  { id:410, hanzi:"想", pinyin:"xiǎng", meaning:"to think; to want", category:"Actions", example:{ hanzi:"你想吃什么？", pinyin:"Nǐ xiǎng chī shénme?", english:"What do you want to eat?" }, writing:"相 (appearance) + 心 (heart).", tip:"An image appearing in your heart/mind = TO WANT or THINK." },
  { id:411, hanzi:"向", pinyin:"xiàng", meaning:"towards", category:"Direction", example:{ hanzi:"向左走。", pinyin:"Xiàng zuǒ zǒu.", english:"Walk towards the left." }, writing:"A pictograph of a window facing a specific direction.", tip:"A house pointing TOWARDS the sun." },
  { id:412, hanzi:"像", pinyin:"xiàng", meaning:"to resemble; to look like", category:"Actions", example:{ hanzi:"他像他爸爸。", pinyin:"Tā xiàng tā bàba.", english:"He looks like his dad." }, writing:"亻(person) + 象 (elephant).", tip:"A person carving an image of an elephant = to RESEMBLE." },
  { id:413, hanzi:"小", pinyin:"xiǎo", meaning:"small", category:"Adjectives", example:{ hanzi:"这个苹果很小。", pinyin:"Zhège píngguǒ hěn xiǎo.", english:"This apple is very small." }, writing:"A center stroke dividing two small drops.", tip:"Tiny drops spreading out = SMALL." },
  { id:414, hanzi:"小孩", pinyin:"xiǎohái", meaning:"child", category:"People", example:{ hanzi:"那个小孩在哭。", pinyin:"Nàgè xiǎohái zài kū.", english:"That child is crying." }, writing:"小 (small) + 孩 (child).", tip:"A small child." },
  { id:415, hanzi:"小姐", pinyin:"xiǎojie", meaning:"Miss; young lady", category:"People", example:{ hanzi:"李小姐你好。", pinyin:"Lǐ xiǎojie nǐ hǎo.", english:"Hello, Miss Li." }, writing:"小 (young/small) + 姐 (older sister).", tip:"A polite address for a young woman." },
  { id:416, hanzi:"小时", pinyin:"xiǎoshí", meaning:"hour", category:"Time", example:{ hanzi:"我等了一个小时。", pinyin:"Wǒ děng le yīgè xiǎoshí.", english:"I waited for one hour." }, writing:"小 (small) + 时 (time).", tip:"A small block of time = HOUR." },
  { id:417, hanzi:"小心", pinyin:"xiǎoxīn", meaning:"careful; take care", category:"Adjectives", example:{ hanzi:"路上小心。", pinyin:"Lùshang xiǎoxīn.", english:"Be careful on the road." }, writing:"小 (small) + 心 (heart).", tip:"Keeping your heart 'small' and cautious = CAREFUL." },
  { id:418, hanzi:"笑", pinyin:"xiào", meaning:"to laugh; to smile", category:"Actions", example:{ hanzi:"他开心地笑了。", pinyin:"Tā kāixīn de xiào le.", english:"He laughed happily." }, writing:"⺮ (bamboo) + 夭 (bending).", tip:"Bamboo bending in the wind looks like a person bending over LAUGHING." },
  { id:419, hanzi:"校长", pinyin:"xiàozhǎng", meaning:"principal", category:"People", example:{ hanzi:"我们的校长很好。", pinyin:"Wǒmen de xiàozhǎng hěn hǎo.", english:"Our principal is very good." }, writing:"校 (school) + 长 (head/elder).", tip:"The head/elder (长) of the school (校) = PRINCIPAL." },
  { id:420, hanzi:"些", pinyin:"xiē", meaning:"some; a few", category:"Grammar", example:{ hanzi:"我买了一些水果。", pinyin:"Wǒ mǎile yīxiē shuǐguǒ.", english:"I bought some fruits." }, writing:"止 (stop) + 匕 (spoon) + 二 (two).", tip:"A small amount you can scoop with a spoon = SOME." },
  { id:421, hanzi:"鞋", pinyin:"xié", meaning:"shoes", category:"Objects", example:{ hanzi:"这双鞋很贵。", pinyin:"Zhè shuāng xié hěn guì.", english:"This pair of shoes is very expensive." }, writing:"革 (leather) + 圭 (jade tablet).", tip:"Leather (革) items worn on your feet." },
  { id:422, hanzi:"写", pinyin:"xiě", meaning:"to write", category:"Actions", example:{ hanzi:"我在写信。", pinyin:"Wǒ zài xiě xìn.", english:"I am writing a letter." }, writing:"冖 (cover) + 与 (give).", tip:"Covering paper with ink strokes." },
  { id:423, hanzi:"谢谢", pinyin:"xièxie", meaning:"thank you", category:"Phrases", example:{ hanzi:"谢谢你的帮助。", pinyin:"Xièxie nǐ de bāngzhù.", english:"Thank you for your help." }, writing:"讠(speech) + 射 (shoot).", tip:"Shooting words of gratitude out = THANKS." },
  { id:424, hanzi:"新", pinyin:"xīn", meaning:"new", category:"Adjectives", example:{ hanzi:"买了一辆新车。", pinyin:"Mǎi le yī liàng xīn chē.", english:"Bought a new car." }, writing:"亲 (close/relative) + 斤 (axe).", tip:"Using an axe to chop fresh, NEW wood." },
  { id:425, hanzi:"新闻", pinyin:"xīnwén", meaning:"news", category:"General", example:{ hanzi:"我看新闻。", pinyin:"Wǒ kàn xīnwén.", english:"I watch the news." }, writing:"新 (new) + 闻 (hear/smell).", tip:"Hearing (闻) new (新) things = NEWS." },
  { id:426, hanzi:"新鲜", pinyin:"xīnxiān", meaning:"fresh", category:"Adjectives", example:{ hanzi:"这个苹果很新鲜。", pinyin:"Zhège píngguǒ hěn xīnxiān.", english:"This apple is very fresh." }, writing:"新 (new) + 鲜 (fresh/fish+sheep).", tip:"As fresh as newly caught fish and sheep." },
  { id:427, hanzi:"信", pinyin:"xìn", meaning:"letter; trust", category:"Objects", example:{ hanzi:"我写了一封信。", pinyin:"Wǒ xiě le yī fēng xìn.", english:"I wrote a letter." }, writing:"亻(person) + 言 (speech).", tip:"A person's written words/speech = LETTER." },
  { id:428, hanzi:"星期", pinyin:"xīngqī", meaning:"week", category:"Time", example:{ hanzi:"星期一我去学校。", pinyin:"Xīngqīyī wǒ qù xuéxiào.", english:"I go to school on Monday." }, writing:"星 (star) + 期 (period).", tip:"A period of time calculated by the stars = WEEK." },
  { id:429, hanzi:"行", pinyin:"xíng", meaning:"to walk; okay/all right", category:"Grammar", example:{ hanzi:"行，没问题。", pinyin:"Xíng, méi wèntí.", english:"Okay, no problem." }, writing:"A pictograph of a crossroad.", tip:"Walking on a crossroad. Also used to say things are OKAY to proceed." },
  { id:430, hanzi:"醒", pinyin:"xǐng", meaning:"to wake up", category:"Actions", example:{ hanzi:"我早上六点醒了。", pinyin:"Wǒ zǎoshang liù diǎn xǐng le.", english:"I woke up at 6 AM." }, writing:"酉 (wine/vessel) + 星 (star).", tip:"Waking up and sobering up when the stars are out." },
  { id:431, hanzi:"姓", pinyin:"xìng", meaning:"surname", category:"People", example:{ hanzi:"你姓什么？", pinyin:"Nǐ xìng shénme?", english:"What is your surname?" }, writing:"女 (woman) + 生 (born).", tip:"In ancient times, surnames were passed down through the mother (女)." },
  { id:432, hanzi:"休息", pinyin:"xiūxi", meaning:"to rest", category:"Actions", example:{ hanzi:"太累了，休息一下吧。", pinyin:"Tài lèi le, xiūxi yīxià ba.", english:"Too tired, let's rest a bit." }, writing:"休 (person resting against tree) + 息 (breath/heart).", tip:"A person (亻) leaning on a tree (木) taking a breath (息) = REST." },
  { id:433, hanzi:"熊猫", pinyin:"xióngmāo", meaning:"panda", category:"Animals", example:{ hanzi:"熊猫很可爱。", pinyin:"Xióngmāo hěn kě'ài.", english:"Pandas are very cute." }, writing:"熊 (bear) + 猫 (cat).", tip:"Literal translation: Bear (熊) cat (猫) = PANDA." },
  { id:434, hanzi:"需要", pinyin:"xūyào", meaning:"to need; to require", category:"Actions", example:{ hanzi:"我需要你的帮助。", pinyin:"Wǒ xūyào nǐ de bāngzhù.", english:"I need your help." }, writing:"需 (rain+beard/need) + 要 (want).", tip:"To desperately want and NEED something." },
  { id:435, hanzi:"雪", pinyin:"xuě", meaning:"snow", category:"Weather", example:{ hanzi:"今天下雪了。", pinyin:"Jīntiān xiàxuě le.", english:"It snowed today." }, writing:"雨 (rain) + 彐 (sweep).", tip:"Frozen rain (雨) that sweeps across the ground = SNOW." },
  { id:436, hanzi:"颜色", pinyin:"yánsè", meaning:"color", category:"Colors", example:{ hanzi:"你喜欢什么颜色？", pinyin:"Nǐ xǐhuān shénme yánsè?", english:"What color do you like?" }, writing:"颜 (face/color) + 色 (hue).", tip:"The hue (色) that brings life to things = COLOR." },
  { id:437, hanzi:"眼镜", pinyin:"yǎnjìng", meaning:"glasses", category:"Objects", example:{ hanzi:"他戴着眼镜。", pinyin:"Tā dài zhe yǎnjìng.", english:"He is wearing glasses." }, writing:"眼 (eye) + 镜 (mirror/lens).", tip:"Lenses (镜) for your eyes (眼) = GLASSES." },
  { id:438, hanzi:"眼睛", pinyin:"yǎnjing", meaning:"eye", category:"Body", example:{ hanzi:"她的眼睛很大。", pinyin:"Tā de yǎnjing hěn dà.", english:"Her eyes are very big." }, writing:"眼 (eye) + 睛 (eyeball).", tip:"Both characters have the eye radical (目)." },
  { id:439, hanzi:"羊肉", pinyin:"yángròu", meaning:"mutton; lamb", category:"Food", example:{ hanzi:"我喜欢吃羊肉。", pinyin:"Wǒ xǐhuān chī yángròu.", english:"I like eating mutton." }, writing:"羊 (sheep) + 肉 (meat).", tip:"Meat (肉) from a sheep (羊) = MUTTON." },
  { id:440, hanzi:"要求", pinyin:"yāoqiú", meaning:"to request; requirement", category:"Actions", example:{ hanzi:"老师对我们要求很高。", pinyin:"Lǎoshī duì wǒmen yāoqiú hěn gāo.", english:"The teacher has high requirements for us." }, writing:"要 (want) + 求 (beg/seek).", tip:"To seek (求) and demand what you want (要)." },
  { id:441, hanzi:"药", pinyin:"yào", meaning:"medicine", category:"Food", example:{ hanzi:"生病了要吃药。", pinyin:"Shēngbìng le yào chī yào.", english:"You must take medicine when you are sick." }, writing:"艹 (plant/grass) + 约 (agreement/bind).", tip:"Ancient Chinese medicine came from herbs and plants (艹)." },
  { id:442, hanzi:"要", pinyin:"yào", meaning:"to want; to be going to", category:"Actions", example:{ hanzi:"我要去北京。", pinyin:"Wǒ yào qù Běijīng.", english:"I am going to Beijing." }, writing:"西 (west) + 女 (woman).", tip:"A strong desire or plan to do something." },
  { id:443, hanzi:"爷爷", pinyin:"yéye", meaning:"grandfather (paternal)", category:"Family", example:{ hanzi:"爷爷在喝茶。", pinyin:"Yéye zài hē chá.", english:"Grandpa is drinking tea." }, writing:"父 (father) + 耶 (particle/sound).", tip:"The father of your father." },
  { id:444, hanzi:"也", pinyin:"yě", meaning:"also; too", category:"Grammar", example:{ hanzi:"我也去。", pinyin:"Wǒ yě qù.", english:"I will go too." }, writing:"A pictograph of a snake or funnel.", tip:"An additive particle meaning ALSO." },
  { id:445, hanzi:"一", pinyin:"yī", meaning:"one", category:"Numbers", example:{ hanzi:"我有一个朋友。", pinyin:"Wǒ yǒu yīgè péngyou.", english:"I have one friend." }, writing:"A single horizontal stroke.", tip:"Just one line!" },
  { id:446, hanzi:"衣服", pinyin:"yīfu", meaning:"clothes", category:"Objects", example:{ hanzi:"这件衣服很漂亮。", pinyin:"Zhè jiàn yīfu hěn piàoliang.", english:"These clothes are beautiful." }, writing:"衣 (clothes radical) + 服 (wear).", tip:"Items you wear to cover your body." },
  { id:447, hanzi:"医生", pinyin:"yīshēng", meaning:"doctor", category:"People", example:{ hanzi:"他在医院做医生。", pinyin:"Tā zài yīyuàn zuò yīshēng.", english:"He works as a doctor in the hospital." }, writing:"医 (medicine) + 生 (life).", tip:"A person whose life's work is medicine." },
  { id:448, hanzi:"医院", pinyin:"yīyuàn", meaning:"hospital", category:"Places", example:{ hanzi:"他在医院工作。", pinyin:"Tā zài yīyuàn gōngzuò.", english:"He works in a hospital." }, writing:"医 (medicine) + 院 (courtyard).", tip:"A courtyard/building (院) for medicine (医)." },
  { id:449, hanzi:"一定", pinyin:"yídìng", meaning:"certainly; must", category:"Adjectives", example:{ hanzi:"我一定会去的。", pinyin:"Wǒ yídìng huì qù de.", english:"I will certainly go." }, writing:"一 (one) + 定 (fixed/settled).", tip:"Fixed solidly as one = CERTAINLY." },
  { id:450, hanzi:"一共", pinyin:"yígòng", meaning:"altogether; in total", category:"Grammar", example:{ hanzi:"一共多少钱？", pinyin:"Yígòng duōshao qián?", english:"How much is it altogether?" }, writing:"一 (one) + 共 (together).", tip:"Bringing everything together as one total sum." },
