<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HSK Master - Smart Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- مكتبة المعلم الذكي للرسم -->
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #b8860b;
    --muted: #7a6f60;
    --border: #c8bfaa;
    --card-bg: #faf7f2;
    --shadow: rgba(26,16,8,0.12);
    --green: #2e7d32;
    --blue: #1565c0;
  }

  /* الوضع الداكن */
  body.dark-mode {
    --ink: #f5f0e8;
    --paper: #121212;
    --cream: #1e1e1e;
    --card-bg: #1a1a1a;
    --border: #333333;
    --muted: #aaaaaa;
    --shadow: rgba(0,0,0,0.5);
    background-image: none;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--paper);
    color: var(--ink);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    transition: background-color 0.3s, color 0.3s;
  }

  /* HEADER & STATS */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .logo { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; font-weight: 900; color: var(--red-light); }
  .stats-bar {
    display: flex;
    gap: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }
  .streak { color: #e67e22; font-weight: bold; }
  
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn {
    background: transparent;
    border: 1px solid rgba(245,240,232,0.3);
    color: var(--paper);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .btn:hover, .btn.active { background: var(--red); border-color: var(--red); }
  .btn-theme { background: var(--gold); border: none; color: #1a1008; font-weight: bold; }

  /* MAIN GRID */
  main { padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
  
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 10px var(--shadow);
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--gold); }
  .card.srs-due { border-left: 4px solid var(--red); }
  .card.srs-done { border-left: 4px solid var(--green); opacity: 0.8; }
  
  .hanzi { font-family: 'Noto Serif SC', serif; font-size: 2.5rem; margin-bottom: 0.5rem; }
  .pinyin { font-size: 0.9rem; color: var(--red); font-style: italic; }
  .meaning { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
    align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(5px);
  }
  .modal-overlay.open { display: flex; }
  
  .modal {
    background: var(--card-bg); border-radius: 16px; width: 100%; max-width: 400px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header { padding: 1.5rem; text-align: center; border-bottom: 1px solid var(--border); position: relative;}
  .close-btn { position: absolute; top: 1rem; right: 1rem; background: var(--cream); border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; color: var(--ink); cursor: pointer;}
  
  /* HANZI WRITER STYLES */
  .writer-section { padding: 1.5rem; text-align: center; background: var(--cream); }
  .writer-container {
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem;
    touch-action: none; /* مهم جداً للرسم على الآيفون بدون تمرير الشاشة */
  }
  .hanzi-box {
    background: var(--paper); border: 2px dashed var(--border); border-radius: 8px;
    width: 120px; height: 120px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
  }
  
  .writer-controls button {
    background: var(--ink); color: var(--paper); border: none; padding: 0.5rem 1rem;
    border-radius: 6px; font-family: 'DM Mono'; font-size: 0.75rem; margin: 0 0.2rem; cursor: pointer;
  }
  .writer-controls button.draw-btn { background: var(--green); }
  
  .word-details { padding: 1.5rem; }
  .detail-lbl { font-family: 'DM Mono'; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.2rem;}
  .detail-txt { margin-bottom: 1rem; font-size: 0.95rem; }
  .example-box { background: var(--cream); padding: 0.8rem; border-left: 3px solid var(--red); border-radius: 0 6px 6px 0; }
  
  /* SRS BUTTONS */
  .srs-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;}
  .srs-btn { padding: 0.8rem; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
  .srs-again { background: var(--red); }
  .srs-good { background: var(--green); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">HSK Master</div>
    <div class="stats-bar">
      <span title="Daily Streak">🔥 <span id="streakCount">0</span> Days</span>
      <button class="btn btn-theme" onclick="toggleTheme()">🌓 Theme</button>
    </div>
  </div>
  <div class="controls">
    <button class="btn active" onclick="filterCards('all', this)">All Words</button>
    <button class="btn" onclick="filterCards('due', this)">Needs Review (SRS)</button>
  </div>
</header>

<main id="cardsGrid"></main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
      <div class="hanzi" id="mHanzi" style="display:none;"></div>
      <div class="pinyin" id="mPinyin" style="font-size: 1.2rem;"></div>
      <div class="meaning" id="mMeaning"></div>
    </div>
    
    <div class="writer-section">
      <div class="detail-lbl">Smart Board (Draw Here)</div>
      <div class="writer-container" id="writerContainer"></div>
      <div class="writer-controls">
        <button onclick="animateStrokes()">👁️ Animate</button>
        <button class="draw-btn" onclick="startQuiz()">✍️ Practice</button>
        <button onclick="resetWriters()">↺ Clear</button>
      </div>
    </div>

    <div class="word-details">
      <div class="detail-lbl">Example</div>
      <div class="example-box detail-txt" id="mExample"></div>
      
      <div class="detail-lbl">Memory Tip</div>
      <div class="detail-txt" id="mTip"></div>
      
      <div class="srs-controls">
        <button class="srs-btn srs-again" onclick="processSRS('again')">Hard / Again</button>
        <button class="srs-btn srs-good" onclick="processSRS('good')">Easy / Mastered</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- SAMPLE DATA (FIRST 15 WORDS FOR TESTING) ---
const hsk1 = [
  { id:1, hanzi:"爱", pinyin:"ài", meaning:"to love", category:"Emotions", example:{ hanzi:"我爱你。", pinyin:"Wǒ ài nǐ.", english:"I love you." }, tip:"Picture a hand (爫) over a heart with a friend (友)." },
  { id:2, hanzi:"八", pinyin:"bā", meaning:"eight", category:"Numbers", example:{ hanzi:"八本书", pinyin:"bā běn shū", english:"eight books" }, tip:"Looks like two legs spreading apart." },
  { id:3, hanzi:"爸爸", pinyin:"bàba", meaning:"dad", category:"Family", example:{ hanzi:"我爸爸", pinyin:"wǒ bàba", english:"my dad" }, tip:"Universal baby talk 'ba-ba'." },
  { id:4, hanzi:"杯子", pinyin:"bēizi", meaning:"cup", category:"Objects", example:{ hanzi:"这个杯子", pinyin:"zhège bēizi", english:"this cup" }, tip:"木 (wood) hints at wooden cups." },
  { id:5, hanzi:"北京", pinyin:"Běijīng", meaning:"Beijing", category:"Places", example:{ hanzi:"去北京", pinyin:"qù Běijīng", english:"go to Beijing" }, tip:"Northern (北) Capital (京)." },
  { id:6, hanzi:"本", pinyin:"běn", meaning:"book (measure word)", category:"Objects", example:{ hanzi:"一本书", pinyin:"yī běn shū", english:"one book" }, tip:"Root of a tree (木)." },
  { id:7, hanzi:"不", pinyin:"bù", meaning:"not; no", category:"Grammar", example:{ hanzi:"我不去", pinyin:"wǒ bù qù", english:"I won't go" }, tip:"A bird flying away." },
  { id:8, hanzi:"菜", pinyin:"cài", meaning:"vegetable; dish", category:"Food", example:{ hanzi:"中国菜", pinyin:"Zhōngguó cài", english:"Chinese food" }, tip:"Picking (采) grass/plants (艹)." },
  { id:9, hanzi:"茶", pinyin:"chá", meaning:"tea", category:"Food", example:{ hanzi:"喝茶", pinyin:"hē chá", english:"drink tea" }, tip:"Person under a tea tree." },
  { id:10, hanzi:"吃", pinyin:"chī", meaning:"to eat", category:"Actions", example:{ hanzi:"吃饭", pinyin:"chī fàn", english:"eat food" }, tip:"Mouth (口) begging (乞) for food." },
  { id:11, hanzi:"大", pinyin:"dà", meaning:"big", category:"Adjectives", example:{ hanzi:"很大", pinyin:"hěn dà", english:"very big" }, tip:"Person with arms spread wide." },
  { id:12, hanzi:"的", pinyin:"de", meaning:"(possessive particle)", category:"Grammar", example:{ hanzi:"我的书", pinyin:"wǒ de shū", english:"my book" }, tip:"Most common character!" },
  { id:13, hanzi:"点", pinyin:"diǎn", meaning:"o'clock; dot", category:"Time", example:{ hanzi:"两点", pinyin:"liǎng diǎn", english:"two o'clock" }, tip:"Fire marks a point in the dark." },
  { id:14, hanzi:"电脑", pinyin:"diànnǎo", meaning:"computer", category:"Objects", example:{ hanzi:"新电脑", pinyin:"xīn diànnǎo", english:"new computer" }, tip:"Electric (电) brain (脑)." },
  { id:15, hanzi:"电视", pinyin:"diànshì", meaning:"TV", category:"Objects", example:{ hanzi:"看电视", pinyin:"kàn diànshì", english:"watch TV" }, tip:"Electric (电) viewing (视)." }
];

// --- APP STATE ---
let srsData = JSON.parse(localStorage.getItem('hsk_srs')) || {};
let currentWordId = null;
let writers = []; // To hold HanziWriter instances

// --- INIT APP ---
function init() {
  checkStreak();
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  renderCards('all');
}

// --- STREAK SYSTEM ---
function checkStreak() {
  let lastVisit = localStorage.getItem('lastVisit');
  let streak = parseInt(localStorage.getItem('streak') || '0');
  let today = new Date().toDateString();
  
  if (lastVisit !== today) {
    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastVisit === yesterday.toDateString()) { streak++; } 
    else { streak = 1; }
    localStorage.setItem('lastVisit', today);
    localStorage.setItem('streak', streak);
  }
  document.getElementById('streakCount').textContent = streak;
}

// --- THEME ---
function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}

// --- RENDER ---
function renderCards(filter) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  let now = Date.now();
  
  hsk1.forEach(w => {
    let wordSrs = srsData[w.id];
    let isDue = wordSrs && wordSrs.nextReview <= now;
    let isMastered = wordSrs && wordSrs.nextReview > now + (86400000 * 3); // More than 3 days in future
    
    if (filter === 'due' && !isDue) return;
    
    let card = document.createElement('div');
    card.className = `card ${isDue ? 'srs-due' : ''} ${isMastered ? 'srs-done' : ''}`;
    card.innerHTML = `<div class="hanzi">${w.hanzi}</div><div class="pinyin">${w.pinyin}</div><div class="meaning">${w.meaning}</div>`;
    card.onclick = () => openModal(w);
    grid.appendChild(card);
  });
}

function filterCards(type, btn) {
  document.querySelectorAll('header .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(type);
}

// --- MODAL & SMART WRITER ---
function openModal(w) {
  currentWordId = w.id;
  document.getElementById('mPinyin').textContent = w.pinyin;
  document.getElementById('mMeaning').textContent = w.meaning;
  document.getElementById('mExample').innerHTML = `${w.example.hanzi}<br><em>${w.example.pinyin}</em><br>${w.example.english}`;
  document.getElementById('mTip').textContent = '💡 ' + w.tip;
  
  setupSmartWriter(w.hanzi);
  
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function setupSmartWriter(hanziWord) {
  const container = document.getElementById('writerContainer');
  container.innerHTML = '';
  writers = [];
  
  let chars = Array.from(hanziWord); // Split into individual characters
  chars.forEach(char => {
    let box = document.createElement('div');
    box.className = 'hanzi-box';
    container.appendChild(box);
    
    let isDark = document.body.classList.contains('dark-mode');
    
    let writer = HanziWriter.create(box, char, {
      width: 120, height: 120,
      padding: 10,
      showCharacter: false,
      strokeAnimationSpeed: 1.5,
      delayBetweenStrokes: 100,
      strokeColor: isDark ? '#e74c3c' : '#c0392b',
      drawingColor: isDark ? '#2e7d32' : '#1565c0',
      outlineColor: isDark ? '#333' : '#ddd'
    });
    writers.push(writer);
  });
}

function animateStrokes() { writers.forEach(w => w.animateCharacter()); }
function startQuiz() { writers.forEach(w => w.quiz()); }
function resetWriters() {
  writers.forEach(w => {
    w.hideCharacter();
    w.cancelQuiz();
  });
}

function closeModal(e) { if (e.target.id === 'modalOverlay') closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// --- SIMPLE SRS SYSTEM ---
function processSRS(performance) {
  let now = Date.now();
  let nextReview = now;
  
  // again = review in 1 minute, good = review in 3 days
  if (performance === 'again') {
    nextReview = now + 60000; 
  } else if (performance === 'good') {
    nextReview = now + (86400000 * 3); 
  }
  
  srsData[currentWordId] = { nextReview: nextReview };
  localStorage.setItem('hsk_srs', JSON.stringify(srsData));
  
  closeModalDirect();
  renderCards(document.querySelector('header .btn.active').textContent.includes('All') ? 'all' : 'due');
}

// Run app
init();
</script>
</body>
</html>
